<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --accent: #e67e22; --dark: #2c1a11; --bg: #fdfaf5; 
            --mcd-green: #27ae60; --mcd-red: #db0007; --mcd-yellow: #ffbc0d; 
        }
        body { 
            font-family: 'Montserrat', sans-serif; background: var(--bg); 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden; 
        }
        
        /* 1. БАННЕР */
        .promo-banner { width: 100%; height: 85px; background: var(--mcd-yellow); flex-shrink: 0; }
        .promo-banner img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 2. БРЕНД */
        .brand-header { padding: 10px; text-align: center; background: white; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .brand-header h1 { margin: 0; font-size: 16px; color: var(--dark); font-weight: 900; text-transform: uppercase; }
        
        /* 3. ПОЛЕ МЕНЮ */
        .main-area { flex-grow: 1; display: flex; overflow: hidden; }
        
        /* Сайдбар */
        .sidebar { width: 85px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; padding-top: 10px; flex-shrink: 0; overflow-y: auto; }
        .cat-item { margin-bottom: 15px; text-align: center; font-size: 8px; color: #555; width: 100%; font-weight: 700; cursor: pointer; }
        .cat-item img { width: 40px; height: 40px; border-radius: 50%; background: #eee; margin-bottom: 4px; border: 2px solid transparent; object-fit: cover; }
        .cat-item.active { color: var(--mcd-red); }
        .cat-item.active img { border-color: var(--mcd-red); }

        /* Сетка товаров */
        .menu-grid { flex-grow: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: start; padding-bottom: 140px; }
        
        /* Компактная карточка */
        .product-card { 
            background: white; border-radius: 12px; padding: 10px; text-align: center; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.05); position: relative; 
            display: flex; flex-direction: column; gap: 2px;
        }
        .product-card img { width: 100%; height: 85px; object-fit: contain; margin-bottom: 4px; }
        
        .product-card h3 { 
            font-size: 9px; margin: 0; font-weight: 700; color: var(--dark); 
            line-height: 1.2; min-height: 22px; display: flex; align-items: center; justify-content: center;
        }
        
        .product-card p { 
            font-size: 7.5px; color: #777; margin: 0; 
            line-height: 1.1; min-height: 18px; display: flex; align-items: center; justify-content: center;
        }
        
        .product-card .price { 
            font-size: 12px; font-weight: 900; color: var(--accent); 
            margin-top: 4px; border-top: 1px solid #f9f9f9; padding-top: 4px;
        }
        
        .qty-badge { position: absolute; top: -4px; right: -4px; background: var(--mcd-red); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; line-height: 18px; display: none; border: 2px solid white; font-weight: 900; }
