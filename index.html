<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --accent: #e67e22; --dark: #2c1a11; --bg: #fdfaf5; 
            --mcd-green: #27ae60; --mcd-red: #db0007; --mcd-yellow: #ffbc0d; 
            --gray: #7f8c8d;
        }
        body { 
            font-family: 'Montserrat', sans-serif; background: var(--bg); 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden; 
        }
        
        .promo-banner { width: 100%; height: 165px; background: var(--mcd-yellow); flex-shrink: 0; }
        .promo-banner img { width: 100%; height: 100%; object-fit: cover; }
        
        .brand-header { padding: 10px 0; text-align: left; background: white; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .brand-header img.logo { max-width: 160px; height: auto; display: block; margin-left: 15px; }
        
        .main-area { flex-grow: 1; display: flex; overflow: hidden; }
        
        .sidebar { width: 85px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; padding-top: 10px; flex-shrink: 0; overflow-y: auto; }
        .cat-item { margin-bottom: 15px; text-align: center; font-size: 8px; color: #555; width: 100%; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .cat-item img { width: 40px; height: 40px; border-radius: 50%; background: #eee; margin-bottom: 4px; border: 2px solid transparent; object-fit: cover; }
        .cat-item.active { color: var(--mcd-red); transform: scale(1.05); }
        .cat-item.active img { border-color: var(--mcd-red); box-shadow: 0 0 10px rgba(219, 0, 7, 0.2); }

        .menu-grid { flex-grow: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-content: start; padding-bottom: 220px; }
        
        .product-card { 
            background: white; border-radius: 12px; padding: 10px; text-align: center; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.05); position: relative; 
            display: flex; flex-direction: column; gap: 4px;
        }
        .product-card img { width: 100%; height: 80px; object-fit: contain; }
        .product-card h3 { font-size: 9px; margin: 0; font-weight: 700; color: var(--dark); }
        .product-card .price { font-size: 11px; font-weight: 900; color: var(--accent); }

        .counter-controls { display: flex; align-items: center; justify-content: space-between; background: #f8f8f8; border-radius: 20px; padding: 2px; margin-top: auto; }
        .btn-qty { width: 28px; height: 28px; border-radius: 50%; border: none; background: white; font-weight: 900; cursor: pointer; }
        .qty-badge { position: absolute; top: -4px; right: -4px; background: var(--mcd-red); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; line-height: 18px; display: none; border: 2px solid white; z-index: 10; font-weight: 900;}

        /* НОВЫЙ ФУТЕР */
        .payment-footer { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #1a1a1a; padding: 15px 15px 30px 15px; 
            z-index: 100; border-radius: 20px 20px 0 0; 
        }
        
        .footer-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
        
        /* Кнопка Посмотреть корзину */
        .btn-view-cart { 
            background: rgba(255,255,255,0.1); color: #fff; 
            border: 1px solid rgba(255,255,255,0.2); 
            padding: 6px 12px; border-radius: 8px; font-size: 10px; 
            font-weight: 700; text-transform: uppercase; cursor: pointer;
        }

        .total-info { text-align: right; }
        .total-label { font-size: 9px; color: #aaa; font-weight: 700; display: block; }
        .total-price { font-size: 20px; color: var(--mcd-yellow); font-weight: 900; }

        /* Группа кнопок в ряд */
        .footer-buttons { display: flex; gap: 10px; }
        
        .btn-action { 
            flex: 1; padding: 14px; border: none; border-radius: 12px; 
            font-weight: 900; font-size: 13px; text-transform: uppercase; 
            cursor: pointer; transition: 0.2s; font-family: 'Montserrat', sans-serif;
        }
        .btn-cancel { background: #333; color: #ccc; } /* Отменить */
        .btn-order { background: var(--mcd-green); color: white; box-shadow: 0 4px 0 #1e8449; } /* Оформить */

        /* Стили для модального окна просмотра корзины */
        #cart-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 2000; display: none;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: white; width: 100%; max-height: 70%; border-radius: 20px;
            padding: 20px; overflow-y: auto; position: relative;
        }

        #order-form { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
            background: white; z-index: 1000; display: none; 
            flex-direction: column; padding: 20px; overflow-y: auto;
        }
    </style>
</head>
<body>

    <div id="cart-modal" onclick="closeCart()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-top:0">Ваш заказ:</h3>
            <div id="cart-items-list" style="font-size: 14px; color: #333;"></div>
            <button class="btn-action btn-cancel" style="width:100%; margin-top:20px;" onclick="closeCart()">Закрыть</button>
        </div>
    </div>

    <div id="order-form">... (форма как была выше) ...</div>

    <div class="promo-banner"><img src="shokoladnya oreshki.jpg"></div>
    <div class="brand-header"><img src="Logo.png?v=4" class="logo"></div>

    <div class="main-area">
        <div class="sidebar">
            <div class="cat-item active" onclick="filterCat('oreshki', this)"><img src="oreshki.png"><br>ОРЕШКИ</div>
            <div class="cat-item" onclick="filterCat('tubes', this)"><img src="trubochka1.jpg"><br>ТРУБОЧКИ</div>
            <div class="cat-item" onclick="filterCat('cakes', this)"><img src="muraveynik.jpg"><br>ПИРОЖНЫЕ</div>
            <div class="cat-item" onclick="filterCat('tort', this)"><img src="tort 2.jpg"><br>ТОРТ</div>
            <div class="cat-item" onclick="filterCat('nabory', this)"><img src="tort 2.jpg"><br>НАБОРЫ</div>
        </div>
        <div class="menu-grid" id="menu-grid"></div>
    </div>

    <div class="payment-footer">
        <div class="footer-top">
            <button class="btn-view-cart" onclick="showCart()">Посмотреть заказ</button>
            <div class="total-info">
                <span class="total-label">ИТОГО:</span>
                <span class="total-price"><span id="total-val">0.00</span> BYN</span>
            </div>
        </div>
        <div class="footer-buttons">
            <button class="btn-action btn-cancel" onclick="clearCart()">Очистить</button>
            <button class="btn-action btn-order" onclick="toggleForm(true)">Оформить заказ</button>
        </div>
    </div>

    <script>
        // ... (предыдущий JS код остается таким же) ...

        function showCart() {
            const list = document.getElementById('cart-items-list');
            if (Object.keys(cart).length === 0) {
                list.innerHTML = "Корзина пуста 🛒";
            } else {
                list.innerHTML = Object.entries(cart)
                    .map(([name, qty]) => `<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span>${name}</span> <b>${qty} шт.</b>
                    </div>`).join('');
            }
            document.getElementById('cart-modal').style.display = 'flex';
        }

        function closeCart() {
            document.getElementById('cart-modal').style.display = 'none';
        }

        // В функции clearCart замени confirm на автоматическое скрытие модалки
        function clearCart() {
            if (Object.keys(cart).length === 0) return;
            tg.showConfirm("Удалить все товары из корзины?", (ok) => {
                if (ok) {
                    cart = {}; total = 0;
                    document.getElementById('total-val').innerText = "0.00";
                    const activeCat = document.querySelector('.cat-item.active').getAttribute('onclick').match(/'([^']+)'/)[1];
                    renderProducts(activeCat);
                }
            });
        }
        
        // Все остальные функции (changeQty, filterCat, submitOrder) скопируй из прошлого кода
    </script>
</body>
</html>
