<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #e67e22; --dark: #2c1a11; --bg: #fdfaf5; --mcd-green: #27ae60; --mcd-red: #db0007; --mcd-yellow: #ffbc0d; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .promo-banner { width: 100%; height: 85px; background: var(--mcd-yellow); flex-shrink: 0; }
        .promo-banner img { width: 100%; height: 100%; object-fit: cover; }
        
        .brand-header { padding: 10px; text-align: center; background: white; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .brand-header h1 { margin: 0; font-size: 16px; color: var(--dark); font-weight: 900; text-transform: uppercase; }
        
        .main-area { flex-grow: 1; display: flex; overflow: hidden; }
        
        .sidebar { width: 85px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; padding-top: 10px; flex-shrink: 0; overflow-y: auto; }
        .cat-item { margin-bottom: 15px; text-align: center; font-size: 8px; color: #555; width: 100%; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .cat-item img { width: 40px; height: 40px; border-radius: 50%; background: #eee; margin-bottom: 4px; border: 2px solid transparent; object-fit: cover; }
        .cat-item.active { color: var(--mcd-red); }
        .cat-item.active img { border-color: var(--mcd-red); }

        .menu-grid { flex-grow: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: start; padding-bottom: 140px; }
        .product-card { background: white; border-radius: 12px; padding: 8px; text-align: center; box-shadow: 0 3px 8px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; min-height: 160px; }
        .product-card img { width: 100%; height: 80px; object-fit: contain; margin-bottom: 4px; }
        .product-card h3 { font-size: 9px; margin: 2px 0; font-weight: 700; color: var(--dark); line-height: 1.1; }
        .product-card p { font-size: 7px; color: #777; margin: 0; line-height: 1; }
        .product-card .price { font-size: 11px; font-weight: 900; color: var(--accent); margin-top: 4px; }
        
        .qty-badge { position: absolute; top: -4px; right: -4px; background: var(--mcd-red); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; line-height: 18px; display: none; border: 2px solid white; font-weight: 900; }

        .payment-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; color: white; padding: 12px; z-index: 100; }
        .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .total-price { font-size: 20px; color: var(--mcd-yellow); font-weight: 900; }
        .btn-pay { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 700; text-transform: uppercase; font-family: 'Montserrat', sans-serif; background: var(--mcd-green); color: white; font-size: 14px; }
    </style>
</head>
<body>

    <div class="promo-banner"><img src="shokoladnya oreshki.jpg"></div>
    <div class="brand-header"><h1>САЛОДКАЯ МАРА</h1></div>

    <div class="main-area">
        <div class="sidebar">
            <div class="cat-item active" onclick="filterCat('oreshki', this)"><img src="oreshki.png"><br>ОРЕШКИ</div>
            <div class="cat-item" onclick="filterCat('tubes', this)"><img src="trubochka1.jpg"><br>ТРУБОЧКИ</div>
            <div class="cat-item" onclick="filterCat('cakes', this)"><img src="muraveynik.jpg"><br>ПИРОЖНОЕ</div>
            <div class="cat-item" onclick="filterCat('tort', this)"><img src="tort 2.jpg"><br>ТОРТЫ</div>
        </div>

        <div class="menu-grid" id="menu-grid">
            </div>
    </div>

    <div class="payment-footer">
        <div class="total-row"><span>ИТОГО:</span><span class="total-price"><span id="total-val">0.00</span> BYN</span></div>
        <button class="btn-pay" onclick="finish()">ЗАКАЗАТЬ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let total = 0; let cart = {};

        const products = [
            { id: 'q1', cat: 'oreshki', name: 'Орешки со сгущёнкой', price: 1.10, img: 'oreshki.png', desc: 'Классические орешки со сгущёнкой, как в детстве' },
            { id: 'q2', cat: 'oreshki', name: 'Орешки со сгущёнкой и орехом', price: 1.50, img: 'oreshki sguchenka oreh.png', desc: 'Классические орешки со сгущёнкой и цельным орехом' },
            { id: 'q3', cat: 'oreshki', name: 'Орешки с кокосом и миндалём', price: 1.80, img: 'oreshki kokos.jpg', desc: 'Тропический вкус нежного кокосового крема и миндаля' },
            { id: 'q4', cat: 'oreshki', name: 'Шоколадные орешки с Nutella и фундуком', price: 1.80, img: 'shokoladnya oreshki.jpg', desc: 'Шоколад в шоколаде. Внутри настоящая Nutella и фундук' },
            { id: 'q5', cat: 'tubes', name: 'Трубочки', price: 4.00, img: 'trubochka1.jpg', desc: 'Хрустящая трубочка со сгущёнкой от края до края' },
            { id: 'q6', cat: 'cakes', name: 'Муравейник', price: 2.50, img: 'muraveynik.jpg', desc: 'Внутри сгущёнка, печенье и грецкий орех' },
            { id: 'q7', cat: 'cakes', name: 'Кокосовое', price: 2.50, img: 'kokosovoe.jpg', desc: 'Нежное кокосовое тесто и прослойка вареной сгущёнки' },
            { id: 'q8', cat: 'cakes', name: 'Грибочек со сгущёнкой', price: 2.50, img: 'grobochki.jpg', desc: 'Классические орешки со сгущёнкой в глазури' },
            { id: 'q9', cat: 'cakes', name: 'Картошка', price: 4.00, img: 'kartoshka.jpg', desc: 'Классическое пирожное, как в детстве' },
            { id: 'q10', cat: 'cakes', name: 'Шоколадная колбаса', price: 12.00, img: 'shokoladnaya kolbasa.jpg', desc: 'Домашний вкус' },
            { id: 'q11', cat: 'tort', name: 'Торт Медовик', price: 65.00, img: 'tort 2.jpg', desc: 'Сливочно-сметанный крем' }
        ];

        function renderProducts(cat) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            products.filter(p => p.cat === cat).forEach(p => {
                grid.innerHTML += `
                    <div class="product-card" onclick="add('${p.name}', ${p.price}, '${p.id}')">
                        <div id="${p.id}" class="qty-badge">${cart[p.name] || 0}</div>
                        <img src="${p.img}">
                        <h3>${p.name}</h3>
                        <p>${p.desc}</p>
                        <div class="price">${p.price.toFixed(2)} BYN</div>
                    </div>
                `;
                if(cart[p.name]) document.getElementById(p.id).style.display = 'block';
            });
        }

        function filterCat(cat, el) {
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            renderProducts(cat);
        }

        function add(n, p, id) {
            total += p; cart[n] = (cart[n] || 0) + 1;
            document.getElementById('total-val').innerText = total.toFixed(2);
            let b = document.getElementById(id);
            b.innerText = cart[n]; b.style.display = 'block';
            tg.HapticFeedback.impactOccurred('light');
        }

        function finish() {
            if (total === 0) return tg.showAlert("Выберите товары");
            tg.sendData(JSON.stringify({order: cart, total: total.toFixed(2)}));
        }

        renderProducts('oreshki');
    </script>
</body>
</html>
