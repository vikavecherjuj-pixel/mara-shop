<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Start - Салодкая мара</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --accent: #e67e22; 
            --mcd-yellow: #ffbc0d; 
            --mcd-green: #27ae60;
            --dark: #2c1a11;
        }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #fff; 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden; 
            text-align: center;
        }
        
        /* ЛОГОТИП СВЕРХУ */
        .brand-header { 
            padding: 15px 0; 
            text-align: left; 
            background: white; 
            flex-shrink: 0; 
        }
        .brand-header img.logo { 
            max-width: 160px; 
            height: auto; 
            margin-left: 20px; 
        }
        
        /* БАННЕР */
        .start-banner { 
            width: 100%; 
            height: 45%; 
            background: var(--mcd-yellow); 
            overflow: hidden; 
            flex-shrink: 0;
        }
        .start-banner img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        .content-block { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 25px; 
        }
        
        .start-title { 
            font-size: 24px; 
            font-weight: 900; 
            text-transform: uppercase; 
            color: var(--dark); 
            margin: 0 0 5px 0;
        }
        
        .start-subtitle {
            font-size: 13px;
            color: #777;
            margin: 0 0 20px 0;
        }
        
        /* ЯЗЫКИ */
        .lang-group { 
            display: flex; 
            gap: 8px; 
            margin: 0 auto;
            width: 100%;
        }
        .lang-btn { 
            flex: 1; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            gap: 5px;
            border: 2px solid #eee; 
            padding: 10px 5px; 
            border-radius: 12px; 
            font-size: 11px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.2s;
            background: white;
        }
        .lang-btn img { width: 24px; border-radius: 3px; }
        
        .lang-btn.selected { 
            border-color: var(--mcd-yellow); 
            background: rgba(255, 188, 13, 0.1);
        }
        
        /* КНОПКА СТАРТА */
        .btn-start { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 16px; 
            font-weight: 900; 
            text-transform: uppercase; 
            background: var(--mcd-green); 
            color: white; 
            font-size: 16px; 
            box-shadow: 0 4px 0 #1e8449; 
            cursor: pointer;
        }
        .btn-start:active { transform: translateY(2px); box-shadow: 0 2px 0 #1e8449; }
    </style>
</head>
<body>

    <div class="brand-header">
        <img src="Logo.png" class="logo" alt="Logo">
    </div>

    <div class="start-banner">
        <img src="shokoladnya oreshki.jpg" alt="Promo">
    </div>

    <div class="content-block">
        <div>
            <h1 id="main-title" class="start-title">Попробуй десерт здесь!</h1>
            <p id="main-subtitle" class="start-subtitle">Выберите язык, чтобы продолжить заказ</p>
        </div>

        <div class="lang-group">
            <div class="lang-btn selected" id="btn-ru" onclick="changeLang('ru')">
                <img src="https://flagcdn.com/w40/ru.png">Русский
            </div>
            <div class="lang-btn" id="btn-by" onclick="changeLang('by')">
                <img src="https://flagcdn.com/w40/by.png">Беларуская
            </div>
            <div class="lang-btn" id="btn-en" onclick="changeLang('en')">
                <img src="https://flagcdn.com/w40/gb.png">English
            </div>
        </div>

        <div class="start-action">
            <button id="start-button" class="btn-start" onclick="goToCatalog()">Начать заказ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Переводы для главной страницы
        const translations = {
            ru: {
                title: "Попробуй десерт здесь!",
                subtitle: "Выберите язык, чтобы продолжить заказ",
                button: "Начать заказ"
            },
            by: {
                title: "Пакаштуй дэсерт тут!",
                subtitle: "Абярыце мову, каб працягнуць замову",
                button: "Пачаць замову"
            },
            en: {
                title: "Try the dessert here!",
                subtitle: "Choose a language to continue",
                button: "Start Order"
            }
        };

        let currentLang = 'ru';

        function changeLang(lang) {
            currentLang = lang;
            
            // Обновляем визуальный выбор
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`btn-${lang}`).classList.add('selected');

            // Мгновенно переводим текст на странице
            document.getElementById('main-title').innerText = translations[lang].title;
            document.getElementById('main-subtitle').innerText = translations[lang].subtitle;
            document.getElementById('start-button').innerText = translations[lang].button;

            tg.HapticFeedback.impactOccurred('light');
        }

        function goToCatalog() {
            // Сохраняем выбор в память браузера
            localStorage.setItem('selectedLang', currentLang);
            
            // Переходим в каталог (убедись, что файл каталога называется shop.html)
            window.location.href = 'shop.html';
        }
    </script>
</body>
</html>
