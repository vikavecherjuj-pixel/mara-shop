<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --mcd-yellow: #ffbc0d; --mcd-green: #27ae60; --dark: #2c1a11; }
        body { font-family: 'Montserrat', sans-serif; background: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; text-align: center; }
        
        /* БАННЕР ВВЕРХУ */
        .start-banner { width: 100%; height: 40%; background: var(--mcd-yellow); overflow: hidden; flex-shrink: 0; }
        .start-banner img { width: 100%; height: 100%; object-fit: cover; }
        
        .content-block { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; padding: 20px 25px 30px 25px; }
        
        .section-label { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #aaa; margin-bottom: 8px; letter-spacing: 1px; }
        
        /* ВЫБОР ГОРОДА */
        .city-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .option-btn { flex: 1; padding: 12px 5px; border: 2px solid #eee; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; background: white; color: var(--dark); transition: 0.2s; }
        .option-btn.selected { border-color: var(--dark); background: var(--dark); color: white; }

        /* ВЫБОР ЯЗЫКА */
        .lang-group { display: flex; gap: 8px; margin-bottom: 20px; }
        .lang-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; border: 2px solid #eee; padding: 10px 5px; border-radius: 12px; font-size: 11px; font-weight: 700; cursor: pointer; background: white; }
        .lang-btn img { width: 20px; border-radius: 3px; }
        .lang-btn.selected { border-color: var(--mcd-yellow); background: rgba(255, 188, 13, 0.1); }
        
        .btn-start { width: 100%; padding: 18px; border: none; border-radius: 16px; font-weight: 900; text-transform: uppercase; background: var(--mcd-green); color: white; font-size: 15px; box-shadow: 0 4px 0 #1e8449; cursor: pointer; }
    </style>
</head>
<body>
    <div class="start-banner"><img src="shokoladnya oreshki.jpg"></div>
    
    <div class="content-block">
        <div>
            <div class="section-label" id="label-city">Ваш город</div>
            <div class="city-group">
                <div class="option-btn selected" id="city-gomel" onclick="selectCity('Гомель')">Гомель</div>
                <div class="option-btn" id="city-other" onclick="selectCity('Другой город')">Другие города РБ</div>
            </div>

            <div class="section-label" id="label-lang">Выберите язык</div>
            <div class="lang-group">
                <div class="lang-btn selected" id="btn-ru" onclick="changeLang('ru')"><img src="https://flagcdn.com/w40/ru.png">Русский</div>
                <div class="lang-btn" id="btn-by" onclick="changeLang('by')"><img src="https://flagcdn.com/w40/by.png">Беларуская</div>
                <div class="lang-btn" id="btn-en" onclick="changeLang('en')"><img src="https://flagcdn.com/w40/gb.png">English</div>
            </div>
        </div>

        <div class="start-action">
            <button id="start-button" class="btn-start" onclick="goToCatalog()">Начать заказ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let currentLang = 'ru';
        let currentCity = 'Гомель';

        const translations = {
            ru: { labelCity: "Ваш город", cityGomel: "Гомель", cityOther: "Другие города РБ", labelLang: "Выберите язык", button: "Начать заказ" },
            by: { labelCity: "Ваш горад", cityGomel: "Гомель", cityOther: "Іншыя гарады РБ", labelLang: "Абярыце мову", button: "Пачаць замову" },
            en: { labelCity: "Your city", cityGomel: "Gomel", cityOther: "Other BY cities", labelLang: "Choose language", button: "Start Order" }
        };

        function selectCity(city) {
            currentCity = city;
            document.querySelectorAll('.city-group .option-btn').forEach(btn => btn.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            tg.HapticFeedback.impactOccurred('light');
        }

        function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(`btn-${lang}`).classList.add('selected');
            
            document.getElementById('label-city').innerText = translations[lang].labelCity;
            document.getElementById('city-gomel').innerText = translations[lang].cityGomel;
            document.getElementById('city-other').innerText = translations[lang].cityOther;
            document.getElementById('label-lang').innerText = translations[lang].labelLang;
            document.getElementById('start-button').innerText = translations[lang].button;
            
            tg.HapticFeedback.impactOccurred('light');
        }

        function goToCatalog() {
            localStorage.setItem('selectedLang', currentLang);
            localStorage.setItem('selectedCity', currentCity);
            window.location.href = 'shop.html';
        }
    </script>
</body>
</html>
