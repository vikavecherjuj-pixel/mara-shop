<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mara Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #fff; text-align: center; }
        .header { padding: 20px; font-size: 24px; font-weight: bold; }
        .banner img { width: 100%; height: auto; }
        .item { border: 1px solid #ccc; margin: 10px; padding: 10px; border-radius: 10px; display: inline-block; width: 150px; }
        .item img { width: 100%; border-radius: 5px; }
        .btn { background: #31b545; color: #fff; border: none; padding: 10px; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%; }
        .cart-btn { position: fixed; bottom: 20px; right: 20px; background: #248bcf; color: #fff; padding: 15px; border-radius: 50%; display: none; }
    </style>
</head>
<body>
    <div class="header">МАРА • VIKI VECHER</div>
    <div class="banner">
        <img src="tort 2.jpg" alt="Banner">
    </div>
    <div id="main">
        </div>
    <button id="cart" class="cart-btn" onclick="sendOrder()">🛒</button>

    <script src="app.js"></script>
</body>
</html>
