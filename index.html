<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Kiosk</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #e67e22; --dark: #2c1a11; --bg: #fdfaf5; --mcd-green: #27ae60; --mcd-red: #db0007; --mcd-yellow: #ffbc0d; }
        body { font-family: "Arial Black", sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* 1. РЕКЛАМНЫЙ БАННЕР */
        .promo-banner { width: 100%; height: 80px; background: var(--mcd-yellow); flex-shrink: 0; }
        .promo-banner img { width: 100%; height: 100%; object-fit: cover; }

        /* 2. НАЗВАНИЕ БРЕНДА */
        .brand-header { padding: 8px; text-align: center; background: white; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .brand-header h1 { margin: 0; font-size: 18px; color: var(--dark); text-transform: uppercase; }

        /* 3. ПОЛЕ МЕНЮ (Слева категории, справа товары) */
        .main-area { flex-grow: 1; display: flex; overflow: hidden; }
        
        /* Категории слева */
        .sidebar { width: 75px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; padding-top: 10px; flex-shrink: 0; overflow-y: auto; }
        .cat-item { margin-bottom: 15px; text-align: center; font-size: 9px; color: #555; width: 100%; cursor: pointer; }
        .cat-item img { width: 40px; height: 40px; border-radius: 50%; background: #eee; margin-bottom: 4px; border: 2px solid transparent; object-fit: cover; }
        .cat-item.active img { border-color: var(--mcd-red); }

        /* Сетка товаров справа */
        .menu-grid { flex-grow: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: start; padding-bottom: 120px; }
        .product-card { background: white; border-radius: 10px; padding: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; }
        .product-card img { width: 100%; height: 80px; object-fit: contain; margin-bottom: 5px; }
        .product-card h3 { font-size: 10px; margin: 4px 0; height: 24px; overflow: hidden; text-transform: uppercase; }
        .product-card .price { font-size: 12px; font-weight: bold; color: var(--accent); margin-bottom: 5px; }
        .qty-badge { position: absolute; top: -4px; right: -4px; background: var(--mcd-red); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; line-height: 20px; display: none; border: 2px solid white; font-weight: bold; }

        /* 4. ПОЛЕ ОПЛАТЫ */
        .payment-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; color: white; padding: 12px; z-index: 100; }
        .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .total-text { font-size: 11px; color: #bbb; }
        .total-price { font-size: 20px; color: var(--mcd-yellow); font-weight: bold; }
