<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #e67e22; --dark: #2c1a11; --bg: #fdfaf5; --mcd-green: #27ae60; --mcd-red: #db0007; --mcd-yellow: #ffbc0d; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .promo-banner { width: 100%; height: 85px; background: var(--mcd-yellow); flex-shrink: 0; }
        .promo-banner img { width: 100%; height: 100%; object-fit: cover; }
        .brand-header { padding: 10px; text-align: center; background: white; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .brand-header h1 { margin: 0; font-size: 18px; color: var(--dark); font-weight: 900; text-transform: uppercase; }
        .main-area { flex-grow: 1; display: flex; overflow: hidden; }
        .sidebar { width: 75px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; padding-top: 10px; flex-shrink: 0; overflow-y: auto; }
        .cat-item { margin-bottom: 15px; text-align: center; font-size: 8px; color: #555; width: 100%; font-weight: 700; }
        .cat-item img { width: 35px; height: 35px; border-radius: 50%; background: #eee; margin-bottom: 4px; border: 2px solid transparent; object-fit: cover; }
        .menu-grid { flex-grow: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: start; padding-bottom: 130px; }
        .product-card { background: white; border-radius: 12px; padding: 8px; text-align: center; box-shadow: 0 3px 8px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; min-height: 180px; }
        .product-card img { width: 100%; height: 85px; object-fit: contain; margin-bottom: 6px; }
        .product-card h3 { font-size: 10px; margin: 4px 0; height: 26px; overflow: hidden; font-weight: 700; color: var(--dark); line-height: 1.2; }
        .product-card .price { font-size: 12px; font-weight: 900; color: var(--accent); margin-top: auto; }
        .qty-badge { position: absolute; top: -4px; right: -4px; background: var(--mcd-red); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; line-height: 20px; display: none; border: 2px solid white; font-weight: 900; }
        .payment-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; color: white; padding: 12px; z-index: 100; }
        .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .total-price { font-size: 20px; color: var(--mcd-yellow); font-weight: 900; }
        .btn-pay { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 700; text-transform: uppercase; font-family: 'Montserrat', sans-serif; background: var(--mcd-green); color: white; font-size: 14px; }
    </style>
</head>
<body>
    <div class="promo-banner"><img src="shokoladnya oreshki.jpg"></div>
    <div class="brand-header"><h1>САЛОДКАЯ МАРА</h1></div>
    <div class="main-area">
        <div class="sidebar">
            <div class="cat-item"><img src="oreshki sgychenka oreh.jpg"><br>ОРЕШКИ</div>
            <div class="cat-item"><img src="trubochka1.jpg"><br>ТРУБОЧКИ</div>
        </div>
        <div class="menu-grid">
            <div class="product-card" onclick="add('Сгущенка+Орех', 1.5, 'q1')">
                <div id="q1" class="qty-badge">0</div>
                <img src="oreshki sgychenka oreh.jpg">
                <h3>Орешки сгущ. + орех</h3>
                <div class="price">1.50 BYN</div>
            </div>
            <div class="product-card" onclick="add('Трубочка', 4.0, 'q2')">
                <div id="q2" class="qty-badge">0</div>
                <img src="trubochka1.jpg">
                <h3>Трубочка сгущ.</h3>
                <div class="price">4.00 BYN</div>
            </div>
            <div class="product-card" onclick="add('Торт Медовик', 65.0, 'q3')">
                <div id="q3" class="qty-badge">0</div>
                <img src="tort 2.jpg">
                <h3>Торт Медовик</h3>
                <div class="price">65.00 BYN</div>
            </div>
            <div class="product-card" onclick="add('Картошка', 4.0, 'q4')">
                <div id="q4" class="qty-badge">0</div>
                <img src="kartoshka.jpg">
                <h3>Пирожное Картошка</h3>
                <div class="price">4.00 BYN</div>
            </div>
        </div>
    </div>
    <div class="payment-footer">
        <div class="total-row"><span>ИТОГО:</span><span class="total-price"><span id="total-val">0.00</span> BYN</span></div>
        <button class="btn-pay" onclick="finish()">ЗАКАЗАТЬ</button>
    </div>
    <script>
        let total = 0; let cart = {};
        function add(n, p, id) {
            total += p; cart[n] = (cart[n] || 0) + 1;
            document.getElementById('total-val').innerText = total.toFixed(2);
            let b = document.getElementById(id); b.innerText = cart[n]; b.style.display = 'block';
        }
        function finish() {
            if (total === 0) return;
            Telegram.WebApp.sendData(JSON.stringify({order: cart, total: total.toFixed(2)}));
        }
    </script>
</body>
</html>
