<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mara Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
            text-align: center;
        }
        .header {
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        .banner img {
            width: 100%;
            height: auto;
        }
        .item {
            border: 1px solid #ccc;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            width: 150px;
        }
        .item img {
            width: 100%;
            border-radius: 5px;
        }
        .btn {
            background-color: #31b545;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
        .cart-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #248bcf;
            color: white;
            padding: 15px;
            border-radius: 50%;
            display: none;
            border: none;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="header">МАРА • VIKI VECHER</div>
    <div class="banner">
        <img src="tort 2.jpg" alt="Banner">
    </div>
    <div id="main">
        </div>
    <button id="cart" class="cart-btn" onclick="sendOrder()">🛒</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let cart = [];

        // Твои оригинальные товары и названия файлов
        const products = [
            { id: 1, name: 'Орешки классик', price: 1.10, img: 'oreshki.png' },
            { id: 2, name: 'Орешки с орехом', price: 1.50, img: 'oreshki sguchenka oreh.png' },
            { id: 3, name: 'Трубочка', price: 2.20, img: 'trubochka1.jpg' },
            { id: 4, name: 'Картошка', price: 1.80, img: 'kartoshka.jpg' },
            { id: 5, name: 'Колбаса', price: 2.00, img: 'shokoladnaya kolbasa.jpg' }
        ];

        const main = document.getElementById('main');
        const cartBtn = document.getElementById('cart');

        function render() {
            main.innerHTML = '';
            products.forEach(p => {
                let div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <img src="${p.img}">
                    <p>${p.name}</p>
                    <p><b>${p.price.toFixed(2)} BYN</b></p>
                    <button class="btn" onclick="addToCart(${p.id})">Добавить</button>
                `;
                main.appendChild(div);
            });
        }

        function addToCart(id) {
            let product = products.find(p => p.id === id);
            cart.push(product);
            cartBtn.style.display = 'block';
        }

        function sendOrder() {
            tg.sendData(JSON.stringify(cart));
            tg.close();
        }

        render();
    </script>
</body>
</html>
