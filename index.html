<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Салодкая Мара</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #8b5a2b; --accent-color: #e67e22; --bg-color: #fdfaf5; }
        body { font-family: sans-serif; background: var(--bg-color); margin: 0; padding: 15px; padding-bottom: 100px; }
        .header { text-align: center; color: var(--main-color); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 110px; object-fit: cover; }
        .card-info { padding: 10px; flex-grow: 1; }
        .card h3 { font-size: 14px; margin: 0; height: 35px; overflow: hidden; }
        .price { color: var(--accent-color); font-weight: bold; margin-top: 5px; display: block; }
        .add-btn { background: var(--main-color); color: white; border: none; width: 100%; padding: 8px; border-radius: 10px; margin-top: 10px; font-weight: bold; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #ddd; }
        .main-btn { background: var(--accent-color); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><h1>✨ Салодкая Мара ✨</h1></div>
    <div class="grid">
        <div class="card">
            <img src="orshki.PNG">
            <div class="card-info">
                <h3>Орешки классика</h3>
                <span class="price">1.1 BYN</span>
                <button class="add-btn" onclick="add('Орешки кл.', 1.1)">В корзину</button>
            </div>
        </div>
        <div class="card">
            <img src="oreshki s orehom.PNG">
            <div class="card-info">
                <h3>Орешки с орехом</h3>
                <span class="price">1.5 BYN</span>
                <button class="add-btn" onclick="add('Орешки с ор.', 1.5)">В корзину</button>
            </div>
        </div>
        <div class="card">
            <img src="kokosovoe.PNG">
            <div class="card-info">
                <h3>Кокосовое</h3>
                <span class="price">2.5 BYN</span>
                <button class="add-btn" onclick="add('Кокосовое', 2.5)">В корзину</button>
            </div>
        </div>
        <div class="card">
            <img src="trubochki.PNG">
            <div class="card-info">
                <h3>Трубочка</h3>
                <span class="price">4.0 BYN</span>
                <button class="add-btn" onclick="add('Трубочка', 4.0)">В корзину</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div style="font-weight:bold"><span id="total">0</span> BYN</div>
        <button class="main-btn" onclick="send()">Заказать</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let total = 0;
        let cart = {};

        function add(name, price) {
            total += price;
            cart[name] = (cart[name] || 0) + 1;
            document.getElementById('total').innerText = total.toFixed(2);
        }

        function send() {
            if (total === 0) return tg.showAlert("Корзина пуста");
            let order = Object.entries(cart).map(([n, q]) => `${n} x${q}`).join(", ");
            tg.sendData(JSON.stringify({order: order, total: total.toFixed(2) + " BYN"}));
        }
    </script>
</body>
</html>
