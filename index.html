<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --burgundy: #630d16;
            --cream: #fdfaf5;
            --gold: #c5a059;
            --dark-brown: #2c1a11;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--cream); 
            color: var(--dark-brown);
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh;
        }

        .welcome-container {
            width: 100%; max-width: 400px; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }

        .logo-main { width: 180px; height: auto; margin-bottom: 30px; }

        h1 { font-weight: 900; font-size: 24px; color: var(--burgundy); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        p { font-size: 14px; color: #777; margin-bottom: 40px; line-height: 1.5; }

        .btn-start {
            background-color: var(--burgundy);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 20px rgba(99, 13, 22, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-start:active {
            transform: scale(0.96);
            box-shadow: 0 3px 10px rgba(99, 13, 22, 0.2);
        }

        .lang-switcher {
            margin-top: auto; padding-bottom: 30px;
            display: flex; gap: 15px;
        }

        .lang-btn {
            background: white; border: 1px solid #ddd;
            padding: 8px 15px; border-radius: 10px;
            font-size: 12px; font-weight: 700; color: #888; cursor: pointer;
        }

        .lang-btn.active {
            border-color: var(--gold); color: var(--gold); background: #fffcf5;
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <img src="Logo.png" alt="Mara Logo" class="logo-main">
        
        <h1 id="txt-welcome">Добро пожаловать</h1>
        <p id="txt-sub">Натуральные десерты ручной работы с душой и историей</p>

        <a href="shop.html" class="btn-start" id="btn-order-start">Начать заказ</a>
    </div>

    <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('ru', this)">RU</button>
        <button class="lang-btn" onclick="setLang('by', this)">BY</button>
        <button class="lang-btn" onclick="setLang('en', this)">EN</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const translations = {
            ru: { welcome: "Добро пожаловать", sub: "Натуральные десерты ручной работы с душой и историей", start: "Начать заказ" },
            by: { welcome: "Сардэчна запрашаем", sub: "Натуральныя дэсерты ручной працы з душой і гісторыяй", start: "Пачаць замова" },
            en: { welcome: "Welcome", sub: "Handmade natural desserts with soul and history", start: "Start Order" }
        };

        function setLang(lang, el) {
            localStorage.setItem('selectedLang', lang);
            document.getElementById('txt-welcome').innerText = translations[lang].welcome;
            document.getElementById('txt-sub').innerText = translations[lang].sub;
            document.getElementById('btn-order-start').innerText = translations[lang].start;

            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            tg.HapticFeedback.selectionChanged();
        }

        // Инициализация языка при загрузке
        const savedLang = localStorage.getItem('selectedLang') || 'ru';
        // Находим нужную кнопку и имитируем нажатие для применения перевода
        const btns = document.querySelectorAll('.lang-btn');
        btns.forEach(b => {
            if(b.innerText.toLowerCase() === savedLang) setLang(savedLang, b);
        });
    </script>
</body>
</html>
