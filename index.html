<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Start Mara Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --accent: #e67e22; 
            --mcd-yellow: #ffbc0d; 
            --mcd-green: #27ae60;
        }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #fff; 
            margin: 0; padding: 0; 
            display: flex; flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            text-align: center;
        }
        
        /* ВЕРХНИЙ БАННЕР (Как в Макдональдсе) */
        .start-banner { 
            width: 100%; 
            height: 55%; 
            background: var(--mcd-yellow); 
            overflow: hidden; 
        }
        .start-banner img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }
        
        /* БЛОК СОДЕРЖИМОГО СНИЗУ */
        .content-block { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 30px; 
        }
        
        /* ЗАГОЛОВОК */
        .start-title { 
            font-size: 26px; 
            font-weight: 900; 
            text-transform: uppercase; 
            color: #2c1a11; 
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }
        
        /* ПОДЗАГОЛОВОК */
        .start-subtitle {
            font-size: 14px;
            color: #777;
            margin: 0 0 20px 0;
        }
        
        /* ГРУППА КНОПОК ЯЗЫКА */
        .lang-group { 
            display: flex; 
            gap: 10px; 
            margin: 0 auto;
            max-width: 400px;
        }
        .lang-btn { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 8px;
            border: 1px solid #ddd; 
            padding: 12px; 
            border-radius: 10px; 
            font-size: 13px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.2s;
            color: #333;
        }
        .lang-btn img {
            width: 18px; height: auto;
        }
        .lang-btn:active, .lang-btn.selected { 
            border-color: var(--accent); 
            background: rgba(230, 126, 34, 0.05);
            color: var(--accent);
        }
        
        /* БОЛЬШАЯ КНОПКА СТАРТА */
        .start-action { margin-top: auto; }
        .btn-start { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 14px; 
            font-weight: 900; 
            text-transform: uppercase; 
            font-family: 'Montserrat', sans-serif; 
            background: var(--mcd-green); 
            color: white; 
            font-size: 15px; 
            cursor: pointer; 
            box-shadow: 0 4px 0 #1e8449; 
            transition: 0.1s;
        }
        .btn-start:active { transform: translateY(2px); box-shadow: 0 2px 0 #1e8449; }
    </style>
</head>
<body>

    <div class="start-banner">
        <img src="shokoladnya oreshki.jpg" alt="Салодкая Мара">
    </div>

    <div class="content-block">
        <div class="text-top">
            <h1 class="start-title">Попробуй десерт здесь!</h1>
            <p class="start-subtitle">Выберите язык, чтобы продолжить заказ</p>
        </div>

        <div class="lang-group">
            <div class="lang-btn selected" onclick="selectLang(this)">
                <img src="https://flagcdn.com/w40/ru.png" alt="ru">Русский
            </div>
            <div class="lang-btn" onclick="selectLang(this)">
                <img src="https://flagcdn.com/w40/by.png" alt="by">Беларуская
            </div>
            <div class="lang-btn" onclick="selectLang(this)">
                <img src="https://flagcdn.com/w40/gb.png" alt="en">English
            </div>
        </div>

        <div class="start-action">
            <button class="btn-start" onclick="startShop()">Начать заказ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // По умолчанию русский
        let currentLang = 'ru'; 

        // Функция выбора языка
        function selectLang(el) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected');
            
            // Получаем язык из текста кнопки (для упрощения)
            currentLang = el.innerText.trim(); 
            
            tg.HapticFeedback.selectionChanged();
        }

        // Функция начала заказа
        function startShop() {
            // Сохраняем выбранный язык в локальное хранилище (чтобы магазин знал, какой язык использовать)
            localStorage.setItem('userLanguage', currentLang);
            
            // Здесь перенаправляем на вашу основную страницу магазина.
            // Предположим, что она называется 'shop.html'
            window.location.href = 'shop.html';
        }
    </script>
</body>
</html>
