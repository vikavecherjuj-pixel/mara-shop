<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Kiosk Full</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --mc-green: #27ae60; --mc-yellow: #ffbc0d; --mc-red: #db0007; --bg: #f5f5f5; }
        body { font-family: "Arial Black", sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Боковая панель категорий */
        .sidebar { width: 90px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; padding-top: 10px; flex-shrink: 0; }
        .cat-item { margin-bottom: 20px; text-align: center; font-size: 9px; color: #555; width: 100%; }
        .cat-item img { width: 45px; height: 45px; border-radius: 50%; background: #eee; margin-bottom: 5px; border: 2px solid transparent; object-fit: cover; }
        .cat-item.active img { border-color: var(--mc-red); }

        /* Основная зона */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-content: start; padding-bottom: 120px; }
        .product-card { background: white; border-radius: 12px; padding: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; justify-content: space-between; min-height: 160px; }
        .product-card img { width: 100%; height: 90px; object-fit: cover; border-radius: 8px; }
        .product-card h3 { font-size: 11px; margin: 8px 0 4px; text-transform: uppercase; line-height: 1.1; }
        .product-card .price { color: #333; font-weight: bold; font-size: 13px; margin-top: auto; }
        
        /* Панель заказа */
        .order-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #222; color: white; padding: 12px; display: flex; flex-direction: column; z-index: 100; }
        .order-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .total-amount { font-size: 18px; color: var(--mc-yellow); }
        .buttons-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; font-size: 13px; }
        .btn-cancel { background: var(--mc-red); color: white; }
        .btn-done { background: var(--mc-green); color: white; }

        .badge { position: absolute; top: -5px; right: -5px; background: var(--mc-red); color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; line-height: 22px; font-weight: bold; display: none; border: 2px solid white; }
    </style>
</head>
