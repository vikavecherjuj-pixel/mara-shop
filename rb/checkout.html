<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - Гомель</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #c5a059; --burgundy: #630d16; --dark: #2c1a11; --bg: #fdfaf5; --green: #21a252; --gray: #f4f4f4; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 12px; color: var(--dark); }
        .checkout-card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 16px; }
        .section-title { font-weight: 900; font-size: 13px; margin-bottom: 16px; color: var(--burgundy); text-transform: uppercase; border-bottom: 1px solid #f8f8f8; padding-bottom: 10px; }
        .delivery-selector { display: flex; background: var(--gray); padding: 4px; border-radius: 14px; margin-bottom: 12px; }
        .delivery-option { flex: 1; padding: 12px; text-align: center; font-size: 12px; font-weight: 700; border-radius: 11px; cursor: pointer; color: #888; }
        .delivery-option.active { background: white; color: var(--burgundy); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input, select, textarea { width: 100%; border: 1px solid transparent; border-radius: 14px; font-family: 'Montserrat'; font-size: 14px; box-sizing: border-box; background: var(--gray); outline: none; padding: 12px; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 20px; background: var(--green); color: white; border: none; border-radius: 18px; font-weight: 900; font-size: 15px; text-transform: uppercase; cursor: pointer; }
        #thanks-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 1000; align-items: center; justify-content: center; text-align: center; }
        .final-total { text-align: right; font-weight: 900; color: var(--accent); font-size: 20px; }
        .preview-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; border-bottom: 1px dashed #eee; padding-bottom: 4px; }
        .discuss-btn { width: 100%; padding: 14px; background: transparent; color: var(--burgundy); border: 2px dashed #ddd; border-radius: 14px; font-weight: 700; font-size: 12px; margin-top: 10px; }
        .discuss-btn.active { background: var(--burgundy); color: white; border-style: solid; }
    </style>
</head>
<body>
    <div id="thanks-overlay">
        <div style="padding: 30px;">
            <h2 style="color: var(--burgundy); font-weight: 900;">СПАСИБО ЗА ЗАКАЗ! ❤️</h2>
            <p>Перенаправляем в чат...</p>
        </div>
    </div>

    <div class="checkout-card">
        <div class="section-title">Ваш выбор</div>
        <div id="cart-list"></div>
        <div class="final-total" id="final-sum">0.00 BYN</div>
    </div>

    <div class="checkout-card">
        <div class="section-title">Способ получения</div>
        <div class="delivery-selector">
            <div class="delivery-option active" id="opt-pickup" onclick="setDeliv('Самовывоз')">Самовывоз</div>
            <div class="delivery-option" id="opt-delivery" onclick="setDeliv('Доставка')">Доставка</div>
        </div>
        <input type="date" id="order-date">
        <select id="order-time">
            <option value="">Выберите время</option>
            <option value="10:00">10:00</option><option value="12:00">12:00</option>
            <option value="14:00">14:00</option><option value="16:00">16:00</option>
            <option value="18:00">18:00</option><option value="20:00">20:00</option>
        </select>
        <button id="btn-discuss" class="discuss-btn" onclick="toggleDisc()">Согласовать время позже</button>
    </div>

    <div class="checkout-card">
        <div class="section-title">Данные</div>
        <input type="text" id="c-name" placeholder="Ваше имя">
        <input type="tel" id="c-phone" value="+375 ">
        <textarea id="c-comment" placeholder="Адрес или комментарий" rows="3"></textarea>
    </div>

    <div class="checkout-card">
        <div class="section-title">Оплата</div>
        <button class="btn-main" onclick="finishOrder()">Оплачено, заказать</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let method = "Самовывоз";
        let isDisc = false;

        // Список товаров (упрощенный для теста, данные берутся из localStorage)
        const productsData = {
            'q1': { name: 'Орешки', price: 1.1 }, 'q11': { name: 'Картошка', price: 4.0 },
            'n1': { name: 'Набор 1', price: 22.0 }, 't1': { name: 'Медовик', price: 65.0 }
            // ... остальные товары добавятся автоматически при совпадении ID
        };

        window.onload = function() {
            const cart = JSON.parse(localStorage.getItem('mara_cart') || '{}');
            const total = localStorage.getItem('mara_total') || '0.00';
            let html = '';
            for (let id in cart) {
                html += `<div class="preview-row"><span>Товар ID: ${id} (${cart[id]} шт)</span></div>`;
            }
            document.getElementById('cart-list').innerHTML = html;
            document.getElementById('final-sum').innerText = total + " BYN";
        };

        function setDeliv(m) {
            method = m;
            document.getElementById('opt-pickup').classList.toggle('active', m === 'Самовывоз');
            document.getElementById('opt-delivery').classList.toggle('active', m === 'Доставка');
        }

        function toggleDisc() {
            isDisc = !isDisc;
            document.getElementById('btn-discuss').classList.toggle('active', isDisc);
        }

        function finishOrder() {
            const name = document.getElementById('c-name').value;
            const phone = document.getElementById('c-phone').value;
            if(!name || phone.length < 10) return alert("Введите имя и телефон!");

            const cart = JSON.parse(localStorage.getItem('mara_cart') || '{}');
            let itemsStr = "";
            for (let id in cart) { itemsStr += "• " + id + " (" + cart[id] + " шт)\n"; }

            const data = {
                name: name, phone: phone, method: method,
                date: isDisc ? "Согласовать" : document.getElementById('order-date').value,
                time: isDisc ? "Согласовать" : document.getElementById('order-time').value,
                items: itemsStr,
                total: document.getElementById('final-sum').innerText,
                city: "БЕЛАРУСЬ (РБ)",
                comment: document.getElementById('c-comment').value
            };

            document.getElementById('thanks-overlay').style.display = 'flex';
            setTimeout(() => {
                tg.sendData(JSON.stringify(data));
                tg.close();
            }, 1500);
        }
    </script>
</body>
</html>
