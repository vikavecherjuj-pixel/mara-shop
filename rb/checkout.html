<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - Оформление РБ</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #c5a059; --burgundy: #630d16; --dark: #2c1a11; --bg: #fdfaf5; --green: #21a252; --gray: #f4f4f4; }
        
        html, body { 
            font-family: 'Montserrat', sans-serif; 
            background: linear-gradient(180deg,#fffdf9 0%,#f8f1e8 100%); 
            margin: 0; padding: 12px; color: var(--dark); min-height: 100vh; 
            overflow-x: hidden; touch-action: pan-y; position: relative; width: 100%;
            -webkit-text-size-adjust: 100%; box-sizing: border-box;
        }

        #checkout-screen { display: flex; flex-direction: column; gap: 16px; padding-bottom: 50px; }
        .back-link-container { margin-bottom: 5px; }
        .back-link-container a { color: #aaa; text-decoration: none; font-size: 13px; font-weight: 700; display: inline-block; padding: 5px 0; }
        
        .checkout-card { 
            background: rgba(255,255,255,0.92); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border-radius: 28px; padding: 22px; box-shadow: 0 8px 25px rgba(99,13,22,0.06), 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.7);
        }

        .section-title {
            font-weight:900; font-size:12px; letter-spacing:1px; margin-bottom:16px;
            color:var(--burgundy); text-transform:uppercase; padding-bottom:10px;
            border-bottom:1px solid rgba(197,160,89,0.18);
        }

        input, select, textarea { 
            width: 100%; border: 1px solid transparent; border-radius: 14px; font-family: 'Montserrat'; font-size: 16px; 
            box-sizing: border-box; background: var(--gray); outline: none; 
            color: #000 !important; caret-color: #000 !important;
            padding: 0 16px; height: 54px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.03);
        }
        input:focus, textarea:focus { border-color: var(--accent); background: #fff; }
        textarea { padding: 14px 16px; min-height: 90px; resize: none; margin-top: 5px; }

        .preview-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 6px; align-items: center; }
        .item-cost { font-weight: 700; color: var(--accent); white-space: nowrap; margin-left: 10px; }

        /* ИЗМЕНЕННЫЙ ПУНКТ К ОПЛАТЕ */
        .payment-summary {
            background: #fdfdfd; border-radius: 18px; padding: 18px 20px; margin-bottom: 15px;
            border: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center;
        }
        .payment-summary label { font-size: 11px; font-weight: 800; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
        .payment-summary span { font-size: 20px; font-weight: 900; color: var(--burgundy); }

        .btn-main {
            width:100%; padding:18px; background:linear-gradient(135deg,#21a252,#17833f);
            color:white; border:none; border-radius:18px; font-weight:900; font-size:15px;
            text-transform:uppercase; cursor:pointer; margin-top:15px; box-shadow:0 10px 25px rgba(33,162,82,0.25);
            font-family: 'Montserrat', sans-serif;
        }

        .upsell-item { 
            display: block; padding: 14px 18px; background: #f8f8f8; border-radius: 16px; 
            margin-bottom: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid transparent; 
        }
        .upsell-item.active { background: #fff8ec; border: 1px solid #c5a059; }

        .erip-phone { color: var(--green); font-weight: 900; font-size: 18px; display: block; margin-top: 8px; }
        
        .copy-btn { 
            width: 100%; padding: 12px; background: var(--gray); color: var(--burgundy); 
            border: none; border-radius: 14px; font-weight: 700; font-size: 12px; 
            text-transform: uppercase; margin-top: 12px; font-family: 'Montserrat', sans-serif;
        }

        @keyframes fadeIn{ from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
    </style>
</head>
<body>
    <div id="checkout-screen">
        <div class="back-link-container"><a href="javascript:history.back();">← Назад</a></div>
        
        <div class="checkout-card">
            <div class="section-title">Ваш выбор</div>
            <div id="cart-list"></div>
        </div>

        <div class="checkout-card">
            <div class="section-title">Ваши данные</div>
            <label style="font-size:10px; font-weight:800; color:#bbb;">ИМЯ</label>
            <input type="text" id="c-name" placeholder="Введите ваше имя">
            <label style="font-size:10px; font-weight:800; color:#bbb; margin-top:12px; display:block;">ТЕЛЕФОН</label>
            <input type="tel" id="c-phone" value="+375 " maxlength="19">
            <label style="font-size:10px; font-weight:800; color:#bbb; margin-top:12px; display:block;">АДРЕС И КОММЕНТАРИЙ</label>
            <textarea id="c-comment" placeholder="Город, улица, дом, кв..."></textarea>
        </div>

        <div class="checkout-card">
            <div class="section-title">Добавить к заказу</div>
            <div class="upsell-item" onclick="toggleUpsell(this,'2 пирожных Картошка',8)"><span>✨ 2 пирожных Картошка</span><b style="color:var(--accent); margin-left:5px;">+8 BYN</b></div>
            <div class="upsell-item" onclick="toggleUpsell(this,'Набор орешков мини (6 шт)',12)"><span>✨ Набор орешков мини (6 шт)</span><b style="color:var(--accent); margin-left:5px;">+12 BYN</b></div>
        </div>

        <div class="checkout-card">
            <div class="section-title">Оплата (ЕРИП)</div>
            <div class="payment-summary">
                <label>К оплате:</label>
                <span id="final-sum">0.00 BYN</span>
            </div>
            <div style="font-size:11px; color:#555; line-height: 1.4;">Система Расчета ЕРИП / Банковские, Финансовые услуги / Банки, НКФО / АЛЬФА-БАНК / Пополнение счета<span class="erip-phone">+375 (29) 651-44-03</span></div>
            <button class="copy-btn" onclick="copyNumber('+375296514403', this)">Скопировать номер</button>
            <button class="btn-main" onclick="finishOrder()">Оплачено, заказать</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let upsells = [];
        const productsData = {
            'q1': { name: 'Орешки со сгущёнкой', price: 1.10 },
            'q2': { name: 'Орешки со сгущёнкой и орехом', price: 1.50 },
            'q3': { name: 'Кокос и миндаль', price: 1.80 },
            'q4': { name: 'Nutella и фундук', price: 1.80 },
            'q5': { name: 'Трубочки', price: 4.00 },
            'q11': { name: 'Картошка', price: 4.00 },
            't1': { name: 'Медовик 1.1кг', price: 65.00 }
        };

        window.onload = render;

        // 1. ОГРАНИЧЕННЫЙ ВВОД ТЕЛЕФОНА (ИЗ СТАРОГО КОДА)
        document.getElementById('c-phone').addEventListener('input', function(e) {
            let digits = e.target.value.substring(5).replace(/\D/g, '');
            if (digits.length > 9) digits = digits.substring(0, 9); 
            let f = '+375 ';
            if (digits.length > 0) f += '(' + digits.substring(0, 2);
            if (digits.length >= 3) f += ') ' + digits.substring(2, 5);
            if (digits.length >= 6) f += '-' + digits.substring(5, 7);
            if (digits.length >= 8) f += '-' + digits.substring(7, 9);
            e.target.value = f;
        });

        function render() {
            const cart = JSON.parse(localStorage.getItem('mara_cart') || '{}');
            let html = '';
            let total = 0;
            for (let id in cart) {
                const item = productsData[id];
                if (item && cart[id] > 0) {
                    let cost = item.price * cart[id];
                    total += cost;
                    html += `<div class="preview-row"><span>${item.name} x${cart[id]}</span><span class="item-cost">${cost.toFixed(2)} BYN</span></div>`;
                }
            }
            upsells.forEach(up => {
                total += up.price;
                html += `<div class="preview-row" style="color:var(--accent)"><span>${up.name}</span><span class="item-cost">${up.price.toFixed(2)} BYN</span></div>`;
            });
            document.getElementById('cart-list').innerHTML = html || 'Корзина пуста';
            document.getElementById('final-sum').innerText = total.toFixed(2) + ' BYN';
        }

        function toggleUpsell(el, name, price) {
            el.classList.toggle('active');
            const idx = upsells.findIndex(x => x.name === name);
            if(idx > -1) upsells.splice(idx, 1);
            else upsells.push({name, price});
            render();
        }

        function copyNumber(num, btn) {
            navigator.clipboard.writeText(num);
            btn.innerText = "Скопировано!";
            setTimeout(() => btn.innerText = "Скопировать номер", 2000);
        }

        // 3. ОТКРЫВАЮЩАЯСЯ СТРАНИЦА "СПАСИБО ЗА ЗАКАЗ" С ТАЙМЕРОМ
        function finishOrder() {
            const name = document.getElementById('c-name').value.trim();
            if(!name) return tg.showAlert("Введите имя");

            const data = {
                name: name,
                phone: document.getElementById('c-phone').value,
                comment: document.getElementById('c-comment').value,
                total: document.getElementById('final-sum').innerText,
                city: "РБ (Почта)"
            };

            // Замена экрана на "Спасибо"
            document.getElementById('checkout-screen').innerHTML = `
            <div style="height:90vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:30px; animation:fadeIn .4s ease;">
                <div style="width:110px; height:110px; border-radius:50%; background:linear-gradient(135deg,#21a252,#1bc965); display:flex; align-items:center; justify-content:center; font-size:56px; color:white; box-shadow:0 15px 35px rgba(33,162,82,.28);">✓</div>
                <div style="font-size:30px; font-weight:900; color:#630d16; margin-top:22px;">Спасибо за заказ</div>
                <div style="font-size:15px; color:#666; line-height:1.6; margin-top:12px; max-width:280px;">
                    Ваш заказ успешно отправлен.<br>Сейчас переведем вас в чат<br>для отправки чека оплаты.
                </div>
                <div id="countdown" style="margin-top:26px; font-size:18px; font-weight:800; color:#c5a059;">3...</div>
            </div>`;

            let sec = 3;
            const timer = setInterval(() => {
                sec--;
                if(document.getElementById('countdown')) document.getElementById('countdown').innerText = sec + '...';
                if(sec <= 0) {
                    clearInterval(timer);
                    tg.sendData(JSON.stringify(data));
                    setTimeout(() => tg.close(), 100);
                }
            }, 1000);
        }
    </script>
</body>
</html>
