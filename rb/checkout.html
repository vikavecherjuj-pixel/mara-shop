<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - РБ</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Montserrat'; background: #fdfaf5; padding: 15px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #eee; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 20px; background: #21a252; color: white; border: none; border-radius: 15px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Оформление по РБ</h3>
        <input type="text" id="cust-name" placeholder="ФИО полностью">
        <input type="tel" id="cust-phone" value="+375 ">
        <select id="post-type">
            <option value="Европочта">Европочта</option>
            <option value="Белпочта">Белпочта</option>
        </select>
        <input type="text" id="post-city" placeholder="Город">
        <input type="text" id="post-addr" placeholder="Отделение или адрес">
        <button class="btn-main" onclick="finalSubmit()">Я оплатил, заказать</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        function finalSubmit() {
            const data = {
                city_type: "РБ (ПОЧТА)",
                name: document.getElementById('cust-name').value,
                phone: document.getElementById('cust-phone').value,
                method: document.getElementById('post-type').value,
                address: document.getElementById('post-city').value + ", " + document.getElementById('post-addr').value,
                total: localStorage.getItem('mara_total') + " BYN"
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
