<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --burgundy: #630d16; --cream: #fdfaf5; --gold: #c5a059; --dark-brown: #2c1a11; }
        body { font-family: 'Montserrat', sans-serif; background: var(--cream); color: var(--dark-brown); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ШАПКА БЕЗ ПОЛОСЫ */
        .header { background: white; flex-shrink: 0; }
        .back-btn { position: absolute; top: 15px; left: 15px; z-index: 10; background: white; border: 1px solid #eee; padding: 6px 12px; border-radius: 20px; font-weight: 700; font-size: 11px; }
        .promo-banner { width: 100%; height: 130px; object-fit: cover; }
        .logo-container { padding: 15px 20px; background: white; text-align: left; }
        .logo-container img { height: 35px; width: auto; } /* ЛОГОТИП СТАЛ БОЛЬШЕ */

        .main-content { display: flex; flex-grow: 1; overflow: hidden; }
        
        /* БОКОВОЕ МЕНЮ */
        .sidebar { width: 90px; background: white; border-right: 1px solid #eee; overflow-y: auto; padding-top: 10px; }
        .cat-item { padding: 12px 5px; text-align: center; font-size: 9px; font-weight: 700; color: #888; cursor: pointer; text-transform: uppercase; }
        .cat-item img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-bottom: 5px; border: 2px solid transparent; }
        .cat-item.active { color: var(--burgundy); }
        .cat-item.active img { border-color: var(--burgundy); }

        /* СЕТКА ТОВАРОВ */
        .products-grid { flex-grow: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 180px; }
        .product-card { background: white; border-radius: 18px; padding: 12px; text-align: center; position: relative; }
        .product-card img { width: 100%; height: 90px; object-fit: contain; }
        .product-card h3 { font-size: 11px; margin: 8px 0 2px; }
        .product-min { font-size: 9px; color: #aaa; margin-bottom: 8px; } /* ВЕРНУЛИ МИНИМАЛЬНЫЙ ЗАКАЗ */
        .price { font-size: 13px; font-weight: 900; color: var(--gold); margin-bottom: 10px; }
        
        .controls { display: flex; align-items: center; justify-content: space-between; background: var(--cream); border-radius: 20px; padding: 3px; }
        .btn-math { width: 30px; height: 30px; border: none; border-radius: 50%; background: white; color: var(--burgundy); font-weight: 900; }
        
        /* ФУТЕР (КАК НА СКРИНШОТЕ) */
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark-brown); padding: 15px; border-top-left-radius: 25px; border-top-right-radius: 25px; }
        .footer-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .total-label { color: #888; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .total-sum { color: var(--gold); font-size: 20px; font-weight: 900; }
        .footer-btns { display: flex; gap: 10px; }
        .btn-clear { flex: 1; background: #3d3d3d; color: #bbb; border: none; padding: 15px; border-radius: 12px; font-weight: 900; text-transform: uppercase; font-size: 12px; }
        .btn-order { flex: 1; background: var(--burgundy); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 900; text-transform: uppercase; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">← Назад</button>
        <img src="shokoladnya oreshki.jpg" class="promo-banner">
        <div class="logo-container"><img src="Logo.png"></div>
    </div>

    <div class="main-content">
        <div class="sidebar" id="sidebar"></div>
        <div class="products-grid" id="grid"></div>
    </div>

    <div class="footer">
        <div class="footer-top">
            <span class="total-label">Итого:</span>
            <span class="total-sum"><span id="total">0.00</span> BYN</span>
        </div>
        <div class="footer-btns">
            <button class="btn-clear" onclick="clearCart()">Очистить</button>
            <button class="btn-order" onclick="tg.showAlert('Заказ принят!')">Оформить</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let lang = localStorage.getItem('selectedLang') || 'ru';
        let city = localStorage.getItem('selectedCity') || 'Гомель';
        
        const products = [
            { id: 'q1', cat: 0, name: {ru: 'Орешки со сгущёнкой', by: 'Арэшкі са згушчонкай', en: 'Condensed milk nuts'}, price: 1.10, img: 'oreshki.png', min: 10 },
            { id: 'q2', cat: 0, name: {ru: 'Орешки + орех', by: 'Арэшкі + арэх', en: 'Nuts with walnut'}, price: 1.50, img: 'oreshki sguchenka oreh.png', min: 10 },
            { id: 'q7', cat: 2, name: {ru: 'Грибочки', by: 'Грыбочкі', en: 'Mushrooms'}, price: 2.50, img: 'grobochki.jpg', min: 12 },
            { id: 't1', cat: 3, name: {ru: 'Медовик 1.1кг', by: 'Мядовік 1.1кг', en: 'Honey cake 1.1kg'}, price: 65.00, img: 'tort 2.jpg', min: 1 },
            { id: 't2', cat: 3, name: {ru: 'Медовик 2.2кг', by: 'Мядовік 2.2кг', en: 'Honey cake 2.2kg'}, price: 130.00, img: 'tort 2.jpg', min: 1 }
        ];

        const cats = { ru: ["Орешки", "Трубочки", "Пирожные", "Торт", "Наборы"], by: ["Арэшкі", "Трубачкі", "Пірожныя", "Торт", "Наборы"], en: ["Nuts", "Tubes", "Cakes", "Cakes", "Sets"] };
        let cart = {}; let total = 0;

        function renderSidebar() {
            const s = document.getElementById('sidebar');
            s.innerHTML = cats[lang].map((n, i) => `
                <div class="cat-item ${i==0?'active':''}" onclick="changeCat(${i}, this)">
                    <img src="oreshki.png">
                    <div>${n}</div>
                </div>`).join('');
        }

        function renderProducts(catIndex) {
            const g = document.getElementById('grid'); g.innerHTML = '';
            if (city !== 'Гомель' && catIndex === 3) {
                g.innerHTML = `<div class="disabled-msg" style="grid-column:1/-1; text-align:center; padding:20px; color:var(--burgundy);">Торты только для Гомеля</div>`; return;
            }
            g.innerHTML = products.filter(p => p.cat === catIndex).map(p => {
                const c = cart[p.id] || 0;
                return `
                <div class="product-card">
                    <img src="${p.img}">
                    <h3>${p.name[lang]}</h3>
                    <div class="product-min">от ${p.min} шт.</div>
                    <div class="price">${p.price.toFixed(2)} BYN</div>
                    <div class="controls">
                        <button class="btn-math" onclick="updateQty('${p.id}', -1)">-</button>
                        <span>${c}</span>
                        <button class="btn-math" onclick="updateQty('${p.id}', 1)">+</button>
                    </div>
                </div>`;
            }).join('');
        }

        function updateQty(id, delta) {
            let p = products.find(x => x.id === id);
            let cur = cart[id] || 0;
            if (cur === 0 && delta === 1) delta = p.min;
            let next = cur + delta;
            if (next < 0) next = 0;
            if (next > 0 && next < p.min && delta < 0) next = 0;
            cart[id] = next;
            calcTotal();
            renderProducts(p.cat);
        }

        function calcTotal() {
            total = 0;
            for (let id in cart) {
                let p = products.find(x => x.id === id);
                total += p.price * cart[id];
            }
            document.getElementById('total').innerText = total.toFixed(2);
        }

        function clearCart() { cart = {}; calcTotal(); renderProducts(0); }
        function changeCat(i, el) {
            document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'));
            el.classList.add('active'); renderProducts(i);
        }

        renderSidebar(); renderProducts(0);
    </script>
</body>
</html>
