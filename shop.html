<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --burgundy: #630d16; --cream: #fdfaf5; --gold: #c5a059; --dark-brown: #2c1a11; }
        body { font-family: 'Montserrat', sans-serif; background: var(--cream); color: var(--dark-brown); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header-container { background: white; flex-shrink: 0; position: relative; }
        .back-floating-btn { position: absolute; top: 15px; left: 15px; z-index: 100; background: rgba(255, 255, 255, 0.9); border: 1px solid #eee; padding: 8px 14px; border-radius: 20px; font-weight: 700; font-size: 11px; color: var(--burgundy); cursor: pointer; }
        .promo-banner { width: 100%; height: 140px; overflow: hidden; border-bottom: 2px solid var(--burgundy); }
        .promo-banner img { width: 100%; height: 100%; object-fit: cover; }
        .logo-area { padding: 10px 20px; border-bottom: 1px solid #eee; background: white; }
        .logo-area img { max-width: 100px; height: auto; }
        .main-area { flex-grow: 1; display: flex; overflow: hidden; }
        .sidebar { width: 85px; background: white; border-right: 1px solid #eee; display: flex; flex-direction: column; align-items: center; padding-top: 10px; overflow-y: auto; }
        .cat-item { margin-bottom: 15px; text-align: center; font-size: 8px; color: #888; width: 100%; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .cat-item img { width: 44px; height: 44px; border-radius: 50%; background: var(--cream); margin-bottom: 4px; border: 2px solid transparent; object-fit: cover; }
        .cat-item.active { color: var(--burgundy); }
        .cat-item.active img { border-color: var(--burgundy); }
        .menu-grid { flex-grow: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-content: start; padding-bottom: 160px; }
        .product-card { background: white; border-radius: 16px; padding: 12px; text-align: center; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .product-card img { width: 100%; height: 80px; object-fit: contain; margin-bottom: 8px; }
        .product-card h3 { font-size: 10px; margin: 0; color: var(--dark-brown); min-height: 24px; }
        .product-card .price { font-size: 12px; font-weight: 900; color: var(--gold); margin: 6px 0; }
        .counter-controls { display: flex; align-items: center; justify-content: space-between; background: var(--cream); border-radius: 20px; padding: 2px; }
        .btn-qty { width: 28px; height: 28px; border-radius: 50%; border: none; background: white; color: var(--burgundy); font-weight: 900; }
        .qty-badge { position: absolute; top: -5px; right: -5px; background: var(--burgundy); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; line-height: 20px; font-weight: 900; }
        .payment-footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark-brown); padding: 15px 15px 30px; border-radius: 24px 24px 0 0; }
        .total-price { font-size: 22px; color: var(--gold); font-weight: 900; }
        .btn-pay { background: var(--burgundy); color: white; border: none; padding: 16px; border-radius: 14px; width: 100%; font-weight: 900; text-transform: uppercase; margin-top: 10px; }
        .disabled-msg { grid-column: 1/-1; padding: 20px; text-align: center; color: var(--burgundy); font-weight: 700; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header-container">
        <button class="back-floating-btn" onclick="window.location.href='index.html'">← Назад</button>
        <div class="promo-banner"><img src="shokoladnya oreshki.jpg"></div>
        <div class="logo-area"><img src="Logo.png"></div>
    </div>
    <div class="main-area">
        <div class="sidebar" id="sidebar"></div>
        <div class="menu-grid" id="menu-grid"></div>
    </div>
    <div class="payment-footer">
        <div style="display:flex; justify-content:space-between; align-items:center; color: #bbb; font-size: 10px;">
            <span>ИТОГО:</span>
            <span class="total-price"><span id="total-val">0.00</span> BYN</span>
        </div>
        <button class="btn-pay" onclick="tg.showAlert('Заказ отправлен!')">Оформить заказ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let lang = localStorage.getItem('selectedLang') || 'ru';
        let city = localStorage.getItem('selectedCity') || 'Гомель';
        const products = [
            { id: 'q1', cat: 0, name: {ru: 'Орешки со сгущёнкой', by: 'Арэшкі са згушчонкай', en: 'Nuts'}, price: 1.10, img: 'oreshki.png', min: 10 },
            { id: 'q2', cat: 0, name: {ru: 'Орешки + орех', by: 'Арэшкі + арэх', en: 'Nuts with walnuts'}, price: 1.50, img: 'oreshki sguchenka oreh.png', min: 10 },
            { id: 'q3', cat: 0, name: {ru: 'Кокос и миндаль', by: 'Кокас і міндаль', en: 'Coconut & Almond'}, price: 1.80, img: 'oreshki kokos.jpg', min: 10 },
            { id: 'q4', cat: 0, name: {ru: 'Nutella и фундук', by: 'Nutella і фундук', en: 'Nutella & Hazelnut'}, price: 1.80, img: 'shokoladnya oreshki.jpg', min: 10 },
            { id: 'q5', cat: 1, name: {ru: 'Трубочки', by: 'Трубачкі', en: 'Sweet tubes'}, price: 4.00, img: 'trubochka1.jpg', min: 6 },
            { id: 'q6', cat: 2, name: {ru: 'Муравейник', by: 'Мурашнік', en: 'Anthill cake'}, price: 2.50, img: 'muraveynik.jpg', min: 8 },
            { id: 'q7', cat: 2, name: {ru: 'Грибочки', by: 'Грыбочкі', en: 'Mushroom cakes'}, price: 2.50, img: 'grobochki.jpg', min: 12 },
            { id: 'q8', cat: 2, name: {ru: 'Сердечки', by: 'Сэрцайкі', en: 'Heart cakes'}, price: 2.50, img: 'serdechki.png', min: 8 },
            { id: 'q9', cat: 2, name: {ru: 'Кокосовое', by: 'Кокасавае', en: 'Coconut cake'}, price: 2.50, img: 'kokosovoe.jpg', min: 8 },
            { id: 'q10', cat: 2, name: {ru: 'Орешки в глазури', by: 'Арэшкі ў глазуры', en: 'Glazed nuts'}, price: 2.50, img: 'orshki v glazuri.jpg', min: 12 },
            { id: 'q11', cat: 2, name: {ru: 'Картошка', by: 'Бульба', en: 'Potato cake'}, price: 4.00, img: 'kartoshka.jpg', min: 4 },
            { id: 'q12', cat: 2, name: {ru: 'Шоколадная колбаса', by: 'Шакаладная каўбаса', en: 'Chocolate sausage'}, price: 12.00, img: 'shokoladnaya kolbasa.jpg', min: 1 },
            { id: 't1', cat: 3, name: {ru: 'Медовик 1.1кг', by: 'Мядовік 1.1кг', en: 'Honey cake 1.1kg'}, price: 65.00, img: 'tort 2.jpg', min: 1 },
            { id: 't2', cat: 3, name: {ru: 'Медовик 2.2кг', by: 'Мядовік 2.2кг', en: 'Honey cake 2.2kg'}, price: 130.00, img: 'tort 2.jpg', min: 1 },
            { id: 'n1', cat: 4, name: {ru: 'Набор Ассорти', by: 'Набор Асарці', en: 'Assorted set'}, price: 30.00, img: 'oreshki.png', min: 1 }
        ];
        const cats = { ru: ["ОРЕШКИ", "ТРУБОЧКИ", "ПИРОЖНЫЕ", "ТОРТ", "НАБОРЫ"], by: ["АРЭШКІ", "ТРУБАЧКІ", "ПІРОЖНЫЯ", "ТОРТ", "НАБОРЫ"] };
        let cart = {}; let total = 0;
        function renderSidebar() {
            const s = document.getElementById('sidebar');
            s.innerHTML = cats[lang].map((n, i) => `<div class="cat-item ${i==0?'active':''}" onclick="changeCat(${i}, this)"><img src="oreshki.png"><br>${n}</div>`).join('');
        }
        function renderProducts(catIndex) {
            const g = document.getElementById('menu-grid'); g.innerHTML = '';
            if (localStorage.getItem('selectedCity') !== 'Гомель' && catIndex === 3) {
                g.innerHTML = `<div class="disabled-msg">Торты доступны только для Гомеля</div>`; return;
            }
            g.innerHTML = products.filter(p => p.cat === catIndex).map(p => {
                const c = cart[p.id] || 0;
                return `<div class="product-card">
                    <div class="qty-badge" id="badge-${p.id}" style="display:${c>0?'block':'none'}">${c}</div>
                    <img src="${p.img}" onerror="this.src='oreshki.png'">
                    <h3>${p.name[lang]}</h3>
                    <div class="price">${p.price.toFixed(2)} BYN</div>
                    <div class="counter-controls">
                        <button class="btn-qty" onclick="changeQty('${p.id}', ${p.price}, ${p.min}, -1)">-</button>
                        <span id="qty-${p.id}">${c}</span>
                        <button class="btn-qty" onclick="changeQty('${p.id}', ${p.price}, ${p.min}, 1)">+</button>
                    </div>
                </div>`;
            }).join('');
        }
        function changeQty(id, price, min, delta) {
            let cur = cart[id] || 0;
            if (cur === 0 && delta === 1) delta = min;
            let next = cur + delta;
            if (next < 0) return;
            if (next < min && next > 0 && delta < 0) next = 0;
            cart[id] = next; total += (delta * price);
            if (cart[id] <= 0) delete cart[id];
            document.getElementById('total-val').innerText = Math.max(0, total).toFixed(2);
            renderProducts(products.find(p => p.id === id).cat);
            tg.HapticFeedback.selectionChanged();
        }
        function changeCat(i, el) {
            document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'));
            el.classList.add('active'); renderProducts(i);
        }
        renderSidebar(); renderProducts(0);
    </script>
</body>
</html>
