<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - Checkout Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --accent: #c5a059; --burgundy: #630d16; --bg: #fdfaf5; 
            --green_ready: #28a745; --red_clear: #dc3545; 
        }
        /* Знак рубля из фото */
        .rub::after { content: ' \0411\0336'; font-weight: 700; }
        
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Стили кнопок футера */
        .payment-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1512; padding: 15px; z-index: 1000; border-radius: 20px 20px 0 0; }
        .footer-btns { display: flex; gap: 10px; margin-top: 10px; }
        .btn-clear { flex: 1; background: #333; color: var(--red_clear); border: none; padding: 15px; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .btn-order { flex: 1; background: #555; color: #888; border: none; padding: 15px; border-radius: 12px; font-weight: 900; text-transform: uppercase; pointer-events: none; transition: 0.3s; }
        .btn-order.active { background: var(--green_ready); color: white; pointer-events: auto; }

        /* Окно оформления */
        #checkout-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; overflow-y: auto; padding: 20px; align-items: flex-start; }
        .modal-form { background: white; border-radius: 25px; padding: 25px; width: 100%; max-width: 350px; margin: auto; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 10px; font-weight: 700; color: #999; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; font-family: 'Montserrat'; box-sizing: border-box; }
        .info-box { background: #fdfaf5; border: 1px solid #eee; border-radius: 12px; padding: 12px; font-size: 11px; line-height: 1.4; color: #555; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div style="flex-grow: 1; overflow-y: auto; padding-bottom: 180px;">
        </div>

    <div class="payment-footer">
        <div style="display:flex; justify-content: space-between; align-items: center; color: white;">
            <button onclick="showCart()" style="background:none; border:1px solid #444; color:white; padding:8px 12px; border-radius:8px; font-size:10px;">ПРОСМОТРЕТЬ ЗАКАЗ</button>
            <div>
                <span style="font-size:10px; color:#888;">ИТОГО:</span>
                <span id="total-val" class="rub" style="font-size:22px; color:var(--accent); font-weight:900;">0.00</span>
            </div>
        </div>
        <div class="footer-btns">
            <button class="btn-clear" onclick="clearCart()">Очистить</button>
            <button id="main-order-btn" class="btn-order" onclick="openCheckout()">Оформить</button>
        </div>
    </div>

    <div id="checkout-modal">
        <div class="modal-form">
            <h2 style="margin:0 0 15px 0; color:var(--burgundy); font-size:18px; text-align:center;">ДАННЫЕ ЗАКАЗА</h2>
            
            <div id="order-items-preview" style="font-size:12px; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;"></div>

            <div class="input-group">
                <label>Ваше ФИО</label>
                <input type="text" id="cust-name" placeholder="Иван Иванов">
            </div>

            <div class="input-group">
                <label>Телефон</label>
                <input type="tel" id="cust-phone" placeholder="+375 (__) ___ __ __">
            </div>

            <div class="input-group">
                <label>Способ получения</label>
                <select id="deliv-method" onchange="toggleDeliveryUI()">
                    <option value="pickup">Самовывоз (Гомель)</option>
                    <option value="yandex">Яндекс.Доставка (Я вызываю сам)</option>
                    <option value="rb">Другие города РБ (Почта)</option>
                </select>
            </div>

            <div id="deliv-info" class="info-box"></div>

            <div id="extra-fields"></div>

            <div class="input-group">
                <label>Время / Комментарий</label>
                <textarea id="cust-comm" rows="2" placeholder="Укажите время или пожелания..."></textarea>
            </div>

            <button class="btn-order active" style="width:100%; margin-bottom:10px;" onclick="sendOrder()">ПОДТВЕРДИТЬ И ОПЛАТИТЬ</button>
            <button onclick="closeCheckout()" style="width:100%; background:none; border:none; color:#999; font-size:11px;">Вернуться назад</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let cart = {}; let total = 0;
        let city = localStorage.getItem('selectedCity') || 'Гомель';

        // Данные для логики
        const MY_ADDR = "Свиридова 11, 6 подъезд";
        const MY_PHONE = "+375 (29) 123-45-67";

        function refreshTotal() {
            const hasKartoshka = cart['q11']; // Проверка по ID картошки
            const minSum = hasKartoshka ? 16 : 20;
            
            const displayTotal = Math.max(0, total);
            document.getElementById('total-val').innerText = displayTotal.toFixed(2);
            
            const btn = document.getElementById('main-order-btn');
            if (displayTotal >= minSum) {
                btn.classList.add('active'); // Станет зеленой
            } else {
                btn.classList.remove('active'); // Станет серой
            }
        }

        function clearCart() {
            cart = {}; total = 0;
            refreshTotal();
            // Тут также вызвать перерисовку карточек товара в каталоге
            tg.HapticFeedback.notificationOccurred('success');
        }

        function openCheckout() {
            const modal = document.getElementById('checkout-modal');
            modal.style.display = 'flex';
            toggleDeliveryUI();
            
            // Список товаров для превью
            let itemsText = Object.entries(cart).map(([id, q]) => {
                return `• Товар ID ${id}: ${q} шт.`;
            }).join('<br>');
            document.getElementById('order-items-preview').innerHTML = itemsText;
        }

        function toggleDeliveryUI() {
            const method = document.getElementById('deliv-method').value;
            const info = document.getElementById('deliv-info');
            const extra = document.getElementById('extra-fields');
            extra.innerHTML = '';

            if (method === 'pickup') {
                info.innerHTML = `📍 <b>Адрес:</b> ${MY_ADDR}<br>📞 <b>Связь:</b> ${MY_PHONE}<br><i>Пожалуйста, наберите за 5-10 мин до приезда.</i>`;
            } else if (method === 'yandex') {
                info.innerHTML = `🚖 <b>Инфо для курьера:</b><br>Адрес: ${MY_ADDR}<br>Тел: ${MY_PHONE}<br><i>Вызывайте курьера к оговоренному времени.</i>`;
            } else {
                info.innerHTML = `📦 <b>Доставка по РБ:</b> 10.00 руб.<br>Отправка Белпочтой или Европочтой после 100% оплаты.`;
                extra.innerHTML = `
                    <div class="input-group"><label>Город и № отделения</label><input type="text" id="post-addr" placeholder="Минск, Европочта №123"></div>
                `;
            }
        }

        function closeCheckout() { document.getElementById('checkout-modal').style.display = 'none'; }

        function sendOrder() {
            const name = document.getElementById('cust-name').value;
            if (!name) return tg.showAlert("Введите ФИО!");
            
            tg.showConfirm("Перейти в чат для оплаты и подтверждения?", (ok) => {
                if(ok) tg.close();
            });
        }

        // Запуск проверки при загрузке
        refreshTotal();
    </script>
</body>
</html>
