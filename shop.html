<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            /* НОВАЯ ПАЛИТРА */
            --burgundy: #630d16; /* Глубокий винный */
            --cream: #fdfaf5;    /* Сливочный фон */
            --gold: #c5a059;     /* Золотистый песок */
            --dark-brown: #2c1a11; /* Натуральный темный */
            --accent-soft: #8b2d35; /* Мягкий бордовый для градиентов */
        }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--cream); 
            color: var(--dark-brown);
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden; 
        }

        /* ШАПКА */
        .header-container { background: white; flex-shrink: 0; position: relative; display: flex; flex-direction: column; }
        
        .back-floating-btn {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px);
            border: 1px solid #eee; padding: 8px 14px; border-radius: 20px;
            font-weight: 700; font-size: 11px; color: var(--burgundy);
            display: flex; align-items: center; gap: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer;
        }

        .promo-banner { width: 100%; height: 160px; overflow: hidden; order: 1; border-bottom: 2px solid var(--burgundy); }
        .promo-banner img { width: 100%; height: 100%; object-fit: cover; }
        
        .logo-area { padding: 12px 20px; order: 2; border-bottom: 1px solid #eee; background: white; }
        .logo-area img { max-width: 120px; height: auto; display: block; }

        .main-area { flex-grow: 1; display: flex; overflow: hidden; }
        
        /* КАТЕГОРИИ (Sidebar) */
        .sidebar { width: 85px; background: white; border-right: 1px solid #eee; display: flex; flex-direction: column; align-items: center; padding-top: 10px; flex-shrink: 0; overflow-y: auto; }
        .cat-item { margin-bottom: 15px; text-align: center; font-size: 8px; color: #888; width: 100%; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
        .cat-item img { width: 44px; height: 44px; border-radius: 50%; background: var(--cream); margin-bottom: 4px; border: 2px solid transparent; object-fit: cover; transition: 0.3s; }
        
        /* Активная категория в цвете Бургунди */
        .cat-item.active { color: var(--burgundy); }
        .cat-item.active img { border-color: var(--burgundy); box-shadow: 0 4px 12px rgba(99, 13, 22, 0.2); transform: scale(1.05); }

        /* КАРТОЧКИ ТОВАРОВ */
        .menu-grid { flex-grow: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-content: start; padding-bottom: 160px; }
        .product-card { background: white; border-radius: 16px; padding: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: relative; border: 1px solid rgba(0,0,0,0.02); }
        .product-card img { width: 100%; height: 90px; object-fit: contain; margin-bottom: 8px; border-radius: 8px; }
        .product-card h3 { font-size: 10px; margin: 0; font-weight: 700; color: var(--dark-brown); min-height: 24px; line-height: 1.2; }
        .product-card p { font-size: 8px; color: #999; margin: 4px 0; }
        .product-card .price { font-size: 12px; font-weight: 900; color: var(--gold); margin: 6px 0; }
        
        /* СЧЕТЧИК (Стиль под крафт) */
        .counter-controls { display: flex; align-items: center; justify-content: space-between; background: var(--cream); border-radius: 25px; padding: 3px; margin-top: 8px; border: 1px solid #ede8e0; }
        .btn-qty { width: 30px; height: 30px; border-radius: 50%; border: none; background: white; color: var(--burgundy); font-weight: 900; font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .qty-val { font-size: 13px; font-weight: 700; color: var(--dark-brown); }
        
        .qty-badge { position: absolute; top: -5px; right: -5px; background: var(--burgundy); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; line-height: 20px; border: 2px solid white; font-weight: 900; z-index: 10; }

        /* ФУТЕР (Темный бургунди) */
        .payment-footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark-brown); padding: 12px 16px 28px 16px; z-index: 100; border-radius: 24px 24px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); }
        .footer-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .btn-view-cart { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.15); padding: 8px 16px; border-radius: 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .total-price { font-size: 22px; color: var(--gold); font-weight: 900; }
        .total-label { font-size: 9px; color: #bbb; text-transform: uppercase; margin-right: 6px; }
        
        .footer-btns-row { display: flex; gap: 12px; }
        .btn-footer { flex: 1; padding: 16px; border: none; border-radius: 14px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-family: 'Montserrat'; font-size: 13px; letter-spacing: 0.5px; transition: 0.2s; }
        .btn-clear { background: #3d2b21; color: #a18e84; }
        .btn-pay { background: var(--burgundy); color: white; box-shadow: 0 4px 15px rgba(99, 13, 22, 0.3); }
        .btn-pay:active { transform: scale(0.97); }

        /* МОДАЛКА */
        #cart-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(44, 26, 17, 0.8); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .modal-content { background: var(--cream); border-radius: 30px; padding: 25px; width: 100%; max-width: 320px; border: 1px solid var(--gold); }
        .cart-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #ede8e0; padding-bottom: 6px; color: var(--dark-brown); }
    </style>
</head>
<body>

    <div class="header-container">
        <button class="back-floating-btn" onclick="window.location.href='index.html'">
            <span>←</span> <span id="txt-back-word">Назад</span>
        </button>

        <div class="promo-banner">
            <img src="shokoladnya oreshki.jpg" alt="Promo">
        </div>
        <div class="logo-area">
            <img src="Logo.png" alt="Logo">
        </div>
    </div>

    <div class="main-area">
        <div class="sidebar" id="sidebar"></div>
        <div class="menu-grid" id="menu-grid"></div>
    </div>

    <div class="payment-footer">
        <div class="footer-top">
            <button class="btn-view-cart" id="txt-view-cart" onclick="showCart()">Заказ</button>
            <div class="total-info">
                <span class="total-label" id="txt-total-label">итого:</span>
                <span class="total-price"><span id="total-val">0.00</span> BYN</span>
            </div>
        </div>
        <div class="footer-btns-row">
            <button class="btn-footer btn-clear" id="txt-clear" onclick="clearCart()">Очистить</button>
            <button class="btn-footer btn-pay" id="txt-order" onclick="tg.showAlert('Заказ отправлен!')">Оформить</button>
        </div>
    </div>

    <div id="cart-modal" onclick="closeCart()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="txt-cart-title" style="text-align:center; font-size: 18px; margin-bottom: 20px; color: var(--burgundy); font-weight: 900;">ВАШ ЗАКАЗ</h2>
            <div id="cart-items-list"></div>
            <button class="btn-pay" style="width: 100%; margin-top:20px;" onclick="closeCart()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let lang = localStorage.getItem('selectedLang') || 'ru';
        let city = localStorage.getItem('selectedCity') || 'Гомель';
        
        const i18n = {
            ru: { back: "Назад", cart: "Заказ", total: "итого:", order: "Оформить", clear: "Очистить", cakeWarning: "Торты доступны только для Гомеля", unit: "шт.", from: "от", empty: "Пусто" },
            by: { back: "Назад", cart: "Замова", total: "вынік:", order: "Аформіць", clear: "Ачысціць", cakeWarning: "Тарты даступныя толькі для Гомеля", unit: "шт.", from: "ад", empty: "Пуста" },
            en: { back: "Back", cart: "Order", total: "total:", order: "Checkout", clear: "Clear", cakeWarning: "Cakes for Gomel only", unit: "pcs.", from: "from", empty: "Empty" }
        };

        const categories = {
            ru: ["ОРЕШКИ", "ТРУБОЧКИ", "ПИРОЖНЫЕ", "ТОРТ", "НАБОРЫ"],
            by: ["АРЭШКІ", "ТРУБАЧКІ", "ПІРОЖНЫЯ", "ТОРТ", "НАБОРЫ"],
            en: ["NUTS", "TUBES", "CAKES", "CAKE", "SETS"]
        };

        const products = [
            { id: 'q1', cat: 0, name: {ru: 'Орешки со сгущёнкой', by: 'Арэшкі са згушчонкай', en: 'Nuts with condensed milk'}, price: 1.10, img: 'oreshki.png', min: 10 },
            { id: 'q2', cat: 0, name: {ru: 'Орешки со сгущёнкой и орехом', by: 'Арэшкі са згушчонкай і арэхам', en: 'Nuts with walnuts'}, price: 1.50, img: 'oreshki sguchenka oreh.png', min: 10 },
            { id: 'q3', cat: 0, name: {ru: 'Кокос и миндаль', by: 'Кокас і міндаль', en: 'Coconut & Almond'}, price: 1.80, img: 'oreshki kokos.jpg', min: 10 },
            { id: 'q4', cat: 0, name: {ru: 'Nutella и фундук', by: 'Nutella і фундук', en: 'Nutella & Hazelnut'}, price: 1.80, img: 'shokoladnya oreshki.jpg', min: 10 },
            { id: 'q5', cat: 1, name: {ru: 'Трубочки со сгущенкой', by: 'Трубачкі са згушчонкай', en: 'Sweet tubes'}, price: 4.00, img: 'trubochka1.jpg', min: 6 },
            { id: 'q6', cat: 2, name: {ru: 'Муравейник', by: 'Мурашнік', en: 'Anthill cake'}, price: 2.50, img: 'muraveynik.jpg', min: 8 },
            { id: 'q7', cat: 2, name: {ru: 'Грибочки', by: 'Грыбочкі', en: 'Mushroom cakes'}, price: 2.50, img: 'grobochki.jpg', min: 12 },
            { id: 'q8', cat: 2, name: {ru: 'Сердечки', by: 'Сэрцайкі', en: 'Heart cakes'}, price: 2.50, img: 'serdechki.png', min: 8 },
            { id: 'q9', cat: 2, name: {ru: 'Кокосовое', by: 'Кокасавае', en: 'Coconut cake'}, price: 2.50, img: 'kokosovoe.jpg', min: 8 },
            { id: 'q10', cat: 2, name: {ru: 'Орешки в глазури', by: 'Арэшкі ў глазуры', en: 'Glazed nuts'}, price: 2.50, img: 'orshki v glazuri.jpg', min: 12 },
            { id: 'q11', cat: 2, name: {ru: 'Картошка', by: 'Бульба', en: 'Potato cake'}, price: 4.00, img: 'kartoshka.jpg', min: 4 },
            { id: 'q12', cat: 2, name: {ru: 'Шоколадная колбаса', by: 'Шакаладная каўбаса', en: 'Chocolate sausage'}, price: 12.00, img: 'shokoladnaya kolbasa.jpg', min: 1 },
            { id: 't1', cat: 3, name: {ru: 'Медовик 1.1кг', by: 'Мядовік 1.1кг', en: 'Honey cake 1.1kg'}, price: 65.00, img: 'tort 2.jpg', min: 1 },
            { id: 'n1', cat: 4, name: {ru: 'Набор Ассорти', by: 'Набор Асарці', en: 'Assorted set'}, price: 30.00, img: 'oreshki.png', min: 1 }
        ];

        let cart = {}; let total = 0;

        function init() {
            document.getElementById('txt-back-word').innerText = i18n[lang].back;
            document.getElementById('txt-view-cart').innerText = i18n[lang].cart;
            document.getElementById('txt-total-label').innerText = i18n[lang].total;
            document.getElementById('txt-order').innerText = i18n[lang].order;
            document.getElementById('txt-clear').innerText = i18n[lang].clear;
            renderSidebar();
            renderProducts(0);
        }

        function renderSidebar() {
            const side = document.getElementById('sidebar');
            const imgs = ['oreshki.png', 'trubochka1.jpg', 'muraveynik.jpg', 'tort 2.jpg', 'oreshki.png'];
            side.innerHTML = categories[lang].map((name, i) => `
                <div class="cat-item ${i==0?'active':''}" onclick="changeCat(${i}, this)">
                    <img src="${imgs[i]}"><br>${name}
                </div>
            `).join('');
        }

        function renderProducts(catIndex) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            const isCakeRestricted = (city !== 'Гомель' && catIndex === 3);
            if (isCakeRestricted) grid.innerHTML = `<div class="disabled-msg" style="color: var(--burgundy); border-color: var(--burgundy);">${i18n[lang].cakeWarning}</div>`;

            grid.innerHTML += products.filter(p => p.cat === catIndex).map(p => {
                const count = cart[p.id] || 0;
                return `
                    <div class="product-card ${isCakeRestricted ? 'disabled' : ''}">
                        <div class="qty-badge" id="badge-${p.id}" style="display:${count>0?'block':'none'}">${count}</div>
                        <img src="${p.img}" onerror="this.src='oreshki.png'">
                        <h3>${p.name[lang]}</h3>
                        <p>${i18n[lang].from} ${p.min} ${i18n[lang].unit}</p>
                        <div class="price">${p.price.toFixed(2)} BYN</div>
                        <div class="counter-controls">
                            <button class="btn-qty" onclick="changeQty('${p.id}', ${p.price}, ${p.min}, -1)">−</button>
                            <span class="qty-val" id="qty-${p.id}">${count}</span>
                            <button class="btn-qty" onclick="changeQty('${p.id}', ${p.price}, ${p.min}, 1)">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function changeCat(i, el) {
            document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderProducts(i);
        }

        function changeQty(id, price, min, delta) {
            let cur = cart[id] || 0;
            if (cur === 0 && delta === 1) delta = min;
            let next = cur + delta;
            if (next < 0) return;
            if (next < min && next > 0 && delta < 0) next = 0;
            cart[id] = next;
            total += (delta * price);
            if (cart[id] <= 0) delete cart[id];
            updateTotalDisplay();
            updateUI(id);
            tg.HapticFeedback.selectionChanged();
        }

        function updateUI(id) {
            if (document.getElementById(`qty-${id}`)) document.getElementById(`qty-${id}`).innerText = cart[id] || 0;
            let b = document.getElementById(`badge-${id}`);
            if (b) { b.innerText = cart[id] || 0; b.style.display = cart[id]>0?'block':'none'; }
        }

        function updateTotalDisplay() {
            document.getElementById('total-val').innerText = Math.max(0, total).toFixed(2);
        }

        function clearCart() {
            cart = {}; total = 0;
            updateTotalDisplay();
            document.querySelectorAll('.qty-badge').forEach(b => b.style.display = 'none');
            document.querySelectorAll('.qty-val').forEach(v => v.innerText = '0');
            tg.HapticFeedback.notificationOccurred('success');
        }

        function showCart() {
            const list = document.getElementById('cart-items-list');
            const entries = Object.entries(cart);
            list.innerHTML = entries.length ? entries.map(([id, q]) => {
                const p = products.find(x => x.id === id);
                return `<div class="cart-row"><span>${p.name[lang]}</span><b>${q} ${i18n[lang].unit}</b></div>`;
            }).join('') : `<div style="text-align:center">${i18n[lang].empty}</div>`;
            document.getElementById('cart-modal').style.display = 'flex';
        }

        function closeCart() { document.getElementById('cart-modal').style.display = 'none'; }
        init();
    </script>
</body>
</html>
