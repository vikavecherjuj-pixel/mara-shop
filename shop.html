<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --accent: #c5a059; --burgundy: #630d16; --dark: #2c1a11; --bg: #fdfaf5; 
            --btn-clear: #e9233a; --btn-order: #21a252; --white: #ffffff;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header-container { background: white; flex-shrink: 0; position: relative; display: flex; flex-direction: column; }
        .back-floating-btn { position: absolute; top: 15px; left: 15px; z-index: 100; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(5px); border: none; padding: 8px 14px; border-radius: 20px; font-weight: 700; font-size: 11px; color: var(--burgundy); cursor: pointer; }
        .promo-banner { width: 100%; height: 160px; overflow: hidden; }
        .promo-banner img { width: 100%; height: 100%; object-fit: cover; }
        .logo-area { padding: 12px 20px; border-bottom: 1px solid #eee; background: white; }
        .logo-area img { max-width: 120px; height: auto; }
        .main-area { flex-grow: 1; display: flex; overflow: hidden; }
        .sidebar { width: 85px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; padding-top: 10px; flex-shrink: 0; overflow-y: auto; }
        .cat-item { margin-bottom: 15px; text-align: center; font-size: 8px; color: #555; width: 100%; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .cat-item img { width: 40px; height: 40px; border-radius: 50%; background: #eee; margin-bottom: 4px; border: 2px solid transparent; object-fit: cover; }
        .cat-item.active { color: var(--burgundy); }
        .cat-item.active img { border-color: var(--burgundy); box-shadow: 0 0 10px rgba(99, 13, 22, 0.2); }
        .menu-grid { flex-grow: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-content: start; padding-bottom: 180px; }
        .product-card { background: white; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 3px 8px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; gap: 4px; }
        .product-card img { width: 100%; height: 80px; object-fit: contain; margin-bottom: 4px; }
        .product-card h3 { font-size: 9px; margin: 0; font-weight: 700; color: var(--dark); min-height: 22px; display: flex; align-items: center; justify-content: center; }
        .product-card p { font-size: 7.5px; color: #777; margin: 0; min-height: 18px; }
        .product-card .price { font-size: 11px; font-weight: 900; color: var(--accent); margin: 4px 0; }
        .counter-controls { display: flex; align-items: center; justify-content: space-between; background: #f8f8f8; border-radius: 20px; padding: 2px; border: 1px solid #eee; margin-top: auto; }
        .btn-qty { width: 28px; height: 28px; border-radius: 50%; border: none; background: white; color: var(--burgundy); font-weight: 900; font-size: 16px; cursor: pointer; }
        .qty-badge { position: absolute; top: -4px; right: -4px; background: var(--burgundy); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; line-height: 18px; display: none; border: 2px solid white; font-weight: 900; z-index: 10; }
        .payment-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1512; padding: 10px 15px 25px 15px; z-index: 500; border-radius: 20px 20px 0 0; }
        .footer-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .total-price { font-size: 20px; color: var(--accent); font-weight: 900; }
        .btn-footer { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 12px; font-family: 'Montserrat'; }
        .btn-view-order {
            background: rgba(255, 255, 255, 0.1);
            color: white; border: none; border-radius: 10px; padding: 10px 12px;
            font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 500;
            text-transform: uppercase; cursor: pointer; white-space: nowrap;
        }
        .btn-clear { background: var(--btn-clear); color: white; margin-right: 10px; }
        .btn-pay { background: var(--btn-order); color: white; }
        #cart-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 2000; display: none; justify-content: center; align-items: flex-end; }
        .modal-content { background: #fdfaf5; width: 100%; border-radius: 25px 25px 0 0; padding: 20px; max-height: 80vh; overflow-y: auto; box-sizing: border-box; }
        .cart-item-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="header-container">
        <button class="back-floating-btn" id="btn-back" onclick="window.location.href='index.html'">← Назад</button>
        <div class="promo-banner"><img src="shokoladnya oreshki.jpg"></div>
        <div class="logo-area"><img src="Logo.png"></div>
    </div>

    <div class="main-area">
        <div class="sidebar" id="sidebar"></div>
        <div class="menu-grid" id="menu-grid"></div>
    </div>

    <div class="payment-footer">
        <div class="footer-top">
            <button onclick="showCart()" class="btn-view-order" id="btn-view-cart">🛒 Просмотреть заказ</button>
            <span class="total-price"><span id="total-val">0.00</span> BYN</span>
        </div>
        <div style="display: flex;">
            <button class="btn-footer btn-clear" id="main-clear-btn" disabled onclick="clearCart()">Очистить</button>
            <button class="btn-footer btn-pay" id="main-pay-btn" disabled onclick="goToCheckout()">Оформить</button>
        </div>
    </div>

    <div id="cart-modal">
        <div class="modal-content">
            <h2 id="modal-title" style="text-align: center; color: var(--burgundy); font-weight: 900; margin-top: 0; font-size: 18px;">ВАШ ЗАКАЗ</h2>
            <div id="cart-items-list"></div>
            <div id="cart-total-modal" style="text-align: right; font-weight: 900; font-size: 18px; margin: 15px 0; color: var(--accent);"></div>
            <button class="btn-footer btn-pay" id="btn-modal-checkout" style="width: 100%;" onclick="goToCheckout()">ОФОРМИТЬ</button>
            <button class="btn-footer" id="btn-modal-back" style="width: 100%; background: #ddd; color: #333; margin-top: 10px;" onclick="document.getElementById('cart-modal').style.display='none'">НАЗАД</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let cart = {}; let total = 0;
        
        // ИЗМЕНЕНО: чтение параметров из URL
        const urlParams = new URLSearchParams(window.location.search);
        let lang = urlParams.get('lang') || localStorage.getItem('selectedLang') || 'ru';
        let cityFromUrl = urlParams.get('city') || localStorage.getItem('selectedCity') || 'Гомель';
        localStorage.setItem('selectedCity', cityFromUrl);

        const ui = {
            ru: { back: "← Назад", view: "🛒 Просмотреть заказ", clear: "Очистить", pay: "Оформить", your_order: "ВАШ ЗАКАЗ", total: "ИТОГО", from: "от", pcs: "шт.", empty: "Пусто" },
            by: { back: "← Назад", view: "🛒 Праглядзець замову", clear: "Ачысціць", pay: "Аформіць", your_order: "ВАША ЗАМОВА", total: "ВЫНІК", from: "ад", pcs: "шт.", empty: "Пуста" },
            en: { back: "← Back", view: "🛒 View Order", clear: "Clear", pay: "Checkout", your_order: "YOUR ORDER", total: "TOTAL", from: "from", pcs: "pcs.", empty: "Empty" }
        };

        const products = [
            { id: 'q1', cat: 0, name: {ru: 'Орешки со сгущёнкой', by: 'Арэшкі са згушчонкай', en: 'Nuts with condensed milk'}, price: 1.10, img: 'oreshki.png', min: 20 },
            { id: 'q2', cat: 0, name: {ru: 'Орешки со сгущёнкой и орехом', by: 'Арэшкі са згушчонкай і арэхам', en: 'Nuts with condensed milk & nut'}, price: 1.50, img: 'oreshki sguchenka oreh.png', min: 20 },
            { id: 'q3', cat: 0, name: {ru: 'Кокос и миндаль', by: 'Какос і миндаль', en: 'Coconut & Almond'}, price: 1.80, img: 'oreshki kokos.jpg', min: 20 },
            { id: 'q4', cat: 0, name: {ru: 'Nutella и фундук', by: 'Nutella і фундук', en: 'Nutella & Hazelnut'}, price: 1.80, img: 'shokoladnya oreshki.jpg', min: 20 },
            { id: 'q5', cat: 1, name: {ru: 'Трубочки со сгущенкой', by: 'Трубачкі са згушчонкай', en: 'Rolls with condensed milk'}, price: 4.00, img: 'trubochka1.jpg', min: 6 },
            { id: 'q6', cat: 2, name: {ru: 'Муравейник', by: 'Мурашнік', en: 'Ant Hill cake'}, price: 2.50, img: 'muraveynik.jpg', min: 8 },
            { id: 'q7', cat: 2, name: {ru: 'Грибочки', by: 'Грыбочкі', en: 'Mushrooms'}, price: 2.50, img: 'grobochki.jpg', min: 12 },
            { id: 'q8', cat: 2, name: {ru: 'Сердечки', by: 'Сэрцайкі', en: 'Hearts'}, price: 2.50, img: 'serdechki.png', min: 8 },
            { id: 'q9', cat: 2, name: {ru: 'Кокосовое', by: 'Какосавае', en: 'Coconut cookies'}, price: 2.50, img: 'kokosovoe.jpg', min: 8 },
            { id: 'q10', cat: 2, name: {ru: 'Орешки в глазури', by: 'Арэшкі ў глазуры', en: 'Glazed nuts'}, price: 2.50, img: 'orshki v glazuri.jpg', min: 12 },
            { id: 'q11', cat: 2, name: {ru: 'Картошка', by: 'Бульба', en: 'Kartoshka cake'}, price: 4.00, img: 'kartoshka.jpg', min: 4 },
            { id: 'q12', cat: 2, name: {ru: 'Шоколадная колбаса', by: 'Шакаладная каўбаса', en: 'Chocolate sausage'}, price: 12.00, img: 'shokoladnaya kolbasa.jpg', min: 1 },
            { id: 't1', name: {ru: 'Медовик 1.1кг', by: 'Мядовік 1.1кг', en: 'Honey cake 1.1kg'}, cat: 3, price: 65.00, img: 'tort 2.jpg', min: 1 },
            { id: 't2', name: {ru: 'Медовик 2.2кг', by: 'Мядовік 2.2кг', en: 'Honey cake 2.2kg'}, cat: 3, price: 130.00, img: 'tort 2.jpg', min: 1 },
            { id: 'n1', name: {ru: 'Набор Ассорти', by: 'Набор Асарці', en: 'Assorted Set'}, cat: 4, price: 30.00, img: 'oreshki.png', min: 1 }
        ];

        function applyLanguage() {
            document.getElementById('btn-back').innerText = ui[lang].back;
            document.getElementById('btn-view-cart').innerText = ui[lang].view;
            document.getElementById('main-clear-btn').innerText = ui[lang].clear;
            document.getElementById('main-pay-btn').innerText = ui[lang].pay;
            document.getElementById('modal-title').innerText = ui[lang].your_order;
            document.getElementById('btn-modal-checkout').innerText = ui[lang].pay;
            document.getElementById('btn-modal-back').innerText = ui[lang].back;
        }

        function init() { 
            const savedCart = localStorage.getItem('mara_cart');
            if (savedCart) cart = JSON.parse(savedCart);
            applyLanguage();
            renderSidebar(); 
            renderProducts(0);
            updateTotal(); 
        }

        function renderSidebar() {
            const imgs = ['oreshki.png', 'trubochka1.jpg', 'muraveynik.jpg', 'tort 2.jpg', 'oreshki.png'];
            const names = {
                ru: ["ОРЕШКИ", "ТРУБОЧКИ", "ПИРОЖНЫЕ", "ТОРТ", "НАБОРЫ"],
                by: ["АРЭШКІ", "ТРУБАЧКІ", "ПІРОЖНЫЯ", "ТОРТ", "НАБОРЫ"],
                en: ["NUTS", "ROLLS", "PASTRIES", "CAKES", "SETS"]
            };
            document.getElementById('sidebar').innerHTML = names[lang].map((n, i) => `
                <div class="cat-item ${i==0?'active':''}" onclick="changeCat(${i}, this)">
                    <img src="${imgs[i]}"><br>${n}
                </div>`).join('');
        }

        function renderProducts(cat) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = products.filter(p => p.cat === cat).map(p => {
                const q = cart[p.id] || 0;
                return `
                    <div class="product-card">
                        <div class="qty-badge" id="badge-${p.id}" style="display:${q>0?'block':'none'}">${q}</div>
                        <img src="${p.img}">
                        <h3>${p.name[lang]}</h3>
                        <p>${ui[lang].from} ${p.min} ${ui[lang].pcs}</p>
                        <div class="price">${p.price.toFixed(2)} BYN</div>
                        <div class="counter-controls">
                            <button class="btn-qty" onclick="changeQty('${p.id}', -1)">-</button>
                            <span id="qty-${p.id}">${q}</span>
                            <button class="btn-qty" onclick="changeQty('${p.id}', 1)">+</button>
                        </div>
                    </div>`;
            }).join('');
        }

        function changeQty(id, delta) {
            const p = products.find(x => x.id === id);
            let cur = cart[id] || 0;
            if (cur === 0 && delta === 1) delta = p.min;
            let next = cur + delta;
            if (next < 0) return;
            if (next < p.min && next > 0 && delta < 0) next = 0;
            cart[id] = next;
            if (cart[id] <= 0) delete cart[id];
            localStorage.setItem('mara_cart', JSON.stringify(cart));
            updateTotal();
        }

        function updateTotal() {
            total = 0; let hasPotato = false; let itemCount = 0;
            for (let k in cart) {
                let pr = products.find(x => x.id === k);
                if (pr) {
                    total += (pr.price * cart[k]);
                    itemCount += cart[k];
                    if (k === 'q11') hasPotato = true;
                    if(document.getElementById(`qty-${k}`)) document.getElementById(`qty-${k}`).innerText = cart[k];
                    let b = document.getElementById(`badge-${k}`);
                    if(b) { b.innerText = cart[k]; b.style.display = 'block'; }
                }
            }
            products.forEach(p => { if(!cart[p.id]) {
                if(document.getElementById(`qty-${p.id}`)) document.getElementById(`qty-${p.id}`).innerText = 0;
                if(document.getElementById(`badge-${p.id}`)) document.getElementById(`badge-${p.id}`).style.display = 'none';
            }});
            document.getElementById('total-val').innerText = total.toFixed(2);
            document.getElementById('main-pay-btn').disabled = (total < (hasPotato ? 16 : 20));
            document.getElementById('main-clear-btn').disabled = (itemCount === 0);
            localStorage.setItem('mara_total', total.toFixed(2));
            if (document.getElementById('cart-modal').style.display === 'flex') showCart();
        }

        function showCart() {
            const list = document.getElementById('cart-items-list');
            const entries = Object.entries(cart);
            if (!entries.length) {
                list.innerHTML = `<div style="text-align:center; color:#999; padding:20px;">${ui[lang].empty}</div>`;
                document.getElementById('cart-total-modal').innerText = "";
            } else {
                list.innerHTML = entries.map(([id, q]) => {
                    const p = products.find(x => x.id === id);
                    if (!p) return '';
                    return `
                        <div class="cart-item-row">
                            <span style="flex:1; font-weight:700; font-size:11px; color:var(--dark);">${p.name[lang]}</span>
                            <div class="counter-controls" style="border:none; background:transparent;">
                                <button class="btn-qty" style="width:24px; height:24px;" onclick="changeQty('${id}', -1)">-</button>
                                <span style="margin:0 10px; font-weight:900; font-size:13px;">${q}</span>
                                <button class="btn-qty" style="width:24px; height:24px;" onclick="changeQty('${id}', 1)">+</button>
                            </div>
                            <span style="margin-left:10px; font-size:11px; color:var(--accent); font-weight:900; min-width:65px; text-align:right;">${(p.price * q).toFixed(2)} BYN</span>
                        </div>`;
                }).join('');
                document.getElementById('cart-total-modal').innerText = ui[lang].total + ": " + total.toFixed(2) + " BYN";
            }
            document.getElementById('cart-modal').style.display = 'flex';
        }

        // ИЗМЕНЕНО: Логика перехода по городам через параметры URL
        function goToCheckout() {
            if (total === 0) return;
            localStorage.setItem('mara_cart', JSON.stringify(cart));
            localStorage.setItem('mara_total', total.toFixed(2));
                
            const urlParams = new URLSearchParams(window.location.search);
            const selectedCity = urlParams.get('city') || localStorage.getItem('selectedCity') || 'Гомель';
                
            if (selectedCity === 'Гомель') {
                window.location.href = 'gomel/checkout.html?city=Гомель&lang=' + lang;
            } else {
                window.location.href = 'rb/checkout.html?city=Другой&lang=' + lang;
            }
        }

        function clearCart() { 
            cart = {}; localStorage.removeItem('mara_cart');
            localStorage.setItem('mara_total', '0.00'); updateTotal(); 
        }
        
        function changeCat(i, el) { 
            document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active')); 
            el.classList.add('active'); renderProducts(i); 
        }
        
        init();
    </script>
</body>
</html>
