<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --burgundy: #630d16; --cream: #fdfaf5; --gold: #c5a059; --dark-bg: #1c1c1c; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #fff; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Шапка */
        .header { position: relative; flex-shrink: 0; }
        .promo-img { width: 100%; height: 160px; object-fit: cover; display: block; }
        .back-btn { 
            position: absolute; top: 15px; left: 15px; 
            background: rgba(255,255,255,0.9); border: none; 
            padding: 8px 15px; border-radius: 20px; 
            font-weight: 700; font-size: 12px; display: flex; align-items: center;
        }

        /* Основная область */
        .main-container { 
            display: flex; flex-grow: 1; overflow: hidden; background: #fff; 
        }

        /* БОКОВОЕ МЕНЮ (Вернули!) */
        .sidebar { 
            width: 80px; flex-shrink: 0; 
            border-right: 1px solid #f0f0f0; 
            display: flex; flex-direction: column; 
            align-items: center; padding-top: 15px;
            overflow-y: auto;
        }
        .cat-item { 
            margin-bottom: 20px; text-align: center; 
            font-size: 9px; font-weight: 700; color: #555; 
            cursor: pointer; text-transform: uppercase; width: 100%;
        }
        .cat-item img { 
            width: 45px; height: 45px; border-radius: 50%; 
            object-fit: cover; margin-bottom: 5px; 
            border: 2px solid transparent; transition: 0.2s;
        }
        .cat-item.active { color: var(--burgundy); }
        .cat-item.active img { border-color: var(--burgundy); transform: scale(1.1); }

        /* Контентная часть (как карточка на скриншоте) */
        .content-area { 
            flex-grow: 1; background: var(--cream); 
            border-top-left-radius: 25px; 
            margin-top: -20px; position: relative; z-index: 5;
            display: flex; flex-direction: column; overflow: hidden;
            padding: 20px 10px 0;
        }
        .brand-name { 
            font-family: 'Brush Script MT', cursive; /* Или похожий рукописный */
            color: var(--burgundy); font-size: 24px; margin: 0 0 15px 10px; 
        }

        .products-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            overflow-y: auto; padding-bottom: 180px; 
        }
        .product-card { 
            background: white; border-radius: 20px; padding: 15px 10px; 
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .product-card img { width: 100%; height: 85px; object-fit: contain; margin-bottom: 10px; }
        .product-card h3 { font-size: 11px; margin: 5px 0; font-weight: 700; }
        .product-min { font-size: 9px; color: #bbb; margin-bottom: 8px; }
        .price { color: var(--gold); font-weight: 900; font-size: 14px; margin-bottom: 12px; }

        .counter { 
            display: flex; align-items: center; justify-content: space-between; 
            background: #f8f8f8; border-radius: 25px; padding: 4px;
        }
        .btn-c { 
            width: 28px; height: 28px; border-radius: 50%; 
            border: none; background: white; font-weight: 900; color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* ФУТЕР (Черный из макета) */
        .footer { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #1a1512; padding: 15px; 
            border-top-left-radius: 25px; border-top-right-radius: 25px; z-index: 10;
        }
        .footer-top { 
            display: flex; justify-content: flex-end; align-items: baseline; 
            margin-bottom: 12px; color: #888; font-size: 10px;
        }
        .total-val { color: var(--gold); font-size: 22px; font-weight: 900; margin-left: 10px; }
        .footer-btns { display: flex; gap: 10px; }
        .btn-footer { 
            flex: 1; padding: 15px; border-radius: 12px; border: none; 
            font-weight: 900; text-transform: uppercase; font-size: 13px; 
        }
        .btn-clear { background: #333; color: #888; }
        .btn-order { background: var(--burgundy); color: white; }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">← Назад</button>
        <img src="shokoladnya oreshki.jpg" class="promo-img">
    </div>

    <div class="main-container">
        <div class="sidebar" id="sidebar">
            </div>

        <div class="content-area">
            <div class="brand-name">Салодкая мара</div>
            <div class="products-grid" id="grid">
                </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-top">
            ИТОГО: <span class="total-val"><span id="total">0.00</span> BYN</span>
        </div>
        <div class="footer-btns">
            <button class="btn-clear" onclick="clearCart()">Очистить</button>
            <button class="btn-order" onclick="tg.showAlert('Заказ оформлен!')">Оформить</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let lang = localStorage.getItem('selectedLang') || 'ru';
        let city = localStorage.getItem('selectedCity') || 'Гомель';
        
        const products = [
            { id: 'q1', cat: 0, name: {ru: 'Орешки со сгущёнкой', by: 'Арэшкі са згушчонкай', en: 'Condensed milk nuts'}, price: 1.10, img: 'oreshki.png', min: 10 },
            { id: 'q2', cat: 0, name: {ru: 'Орешки + орех', by: 'Арэшкі + арэх', en: 'Nuts with walnut'}, price: 1.50, img: 'oreshki sguchenka oreh.png', min: 10 },
            { id: 'q3', cat: 0, name: {ru: 'Кокос и миндаль', by: 'Кокас і міндаль', en: 'Coconut'}, price: 1.80, img: 'oreshki kokos.jpg', min: 10 },
            { id: 'q4', cat: 0, name: {ru: 'Nutella и фундук', by: 'Nutella і фундук', en: 'Nutella'}, price: 1.80, img: 'shokoladnya oreshki.jpg', min: 10 },
            { id: 'q6', cat: 2, name: {ru: 'Муравейник', by: 'Мурашнік', en: 'Anthill'}, price: 2.50, img: 'muraveynik.jpg', min: 8 },
            { id: 'q7', cat: 2, name: {ru: 'Грибочки', by: 'Грыбочкі', en: 'Mushrooms'}, price: 2.00, img: 'grobochki.jpg', min: 6 },
            { id: 't1', cat: 3, name: {ru: 'Медовик 1.1кг', by: 'Мядовік 1.1кг', en: 'Honey cake'}, price: 65.00, img: 'tort 2.jpg', min: 1 }
        ];

        const cats = {
            ru: ["Орешки", "Трубочки", "Пирожные", "Торт", "Наборы"],
            by: ["Арэшкі", "Трубачкі", "Пірожныя", "Торт", "Наборы"],
            en: ["Nuts", "Tubes", "Cakes", "Cakes", "Sets"]
        };

        let cart = {}; let total = 0;

        function renderSidebar() {
            const s = document.getElementById('sidebar');
            s.innerHTML = cats[lang].map((n, i) => `
                <div class="cat-item ${i==0?'active':''}" onclick="changeCat(${i}, this)">
                    <img src="oreshki.png">
                    <div>${n}</div>
                </div>`).join('');
        }

        function renderProducts(catIndex) {
            const g = document.getElementById('grid'); g.innerHTML = '';
            
            // Запрет тортов для других городов
            if (city !== 'Гомель' && catIndex === 3) {
                g.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:#999; font-size:12px;">Торты доступны только при заказе в Гомеле.</div>`;
                return;
            }

            const filtered = products.filter(p => p.cat === catIndex);
            g.innerHTML = filtered.map(p => {
                const count = cart[p.id] || 0;
                return `
                <div class="product-card">
                    <img src="${p.img}" onerror="this.src='oreshki.png'">
                    <h3>${p.name[lang]}</h3>
                    <div class="product-min">от ${p.min} шт.</div>
                    <div class="price">${p.price.toFixed(2)} BYN</div>
                    <div class="counter">
                        <button class="btn-c" onclick="updateQty('${p.id}', -1)">-</button>
                        <span style="font-weight:700; font-size:14px;">${count}</span>
                        <button class="btn-c" onclick="updateQty('${p.id}', 1)">+</button>
                    </div>
                </div>`;
            }).join('');
        }

        function updateQty(id, delta) {
            let p = products.find(x => x.id === id);
            let cur = cart[id] || 0;
            
            if (cur === 0 && delta === 1) {
                cart[id] = p.min;
            } else {
                let next = cur + delta;
                if (next < p.min && delta < 0) next = 0;
                if (next < 0) next = 0;
                cart[id] = next;
            }
            
            if (cart[id] === 0) delete cart[id];
            
            calculateTotal();
            renderProducts(p.cat);
            tg.HapticFeedback.impactOccurred('light');
        }

        function calculateTotal() {
            total = 0;
            for (let id in cart) {
                let p = products.find(x => x.id === id);
                total += p.price * cart[id];
            }
            document.getElementById('total').innerText = total.toFixed(2);
        }

        function clearCart() { 
            cart = {}; total = 0; 
            document.getElementById('total').innerText = "0.00";
            let activeCat = Array.from(document.querySelectorAll('.cat-item')).findIndex(el => el.classList.contains('active'));
            renderProducts(activeCat); 
        }

        function changeCat(i, el) {
            document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderProducts(i);
        }

        renderSidebar();
        renderProducts(0);
    </script>
</body>
</html>
