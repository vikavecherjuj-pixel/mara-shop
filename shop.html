<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - Catalog</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #c5a059; --burgundy: #630d16; --dark: #2c1a11; --bg: #fdfaf5; --green: #28a745; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header-container { background: white; flex-shrink: 0; position: relative; display: flex; flex-direction: column; }
        .back-floating-btn { position: absolute; top: 15px; left: 15px; z-index: 100; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(5px); border: none; padding: 8px 14px; border-radius: 20px; font-weight: 700; font-size: 11px; display: flex; align-items: center; gap: 5px; color: var(--burgundy); cursor: pointer; }
        .promo-banner { width: 100%; height: 160px; overflow: hidden; order: 1; }
        .promo-banner img { width: 100%; height: 100%; object-fit: cover; }
        .logo-area { padding: 12px 20px; order: 2; border-bottom: 1px solid #eee; background: white; }
        .logo-area img { max-width: 120px; height: auto; display: block; }
        .main-area { flex-grow: 1; display: flex; overflow: hidden; }
        .sidebar { width: 85px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; align-items: center; padding-top: 10px; flex-shrink: 0; overflow-y: auto; }
        .cat-item { margin-bottom: 15px; text-align: center; font-size: 8px; color: #555; width: 100%; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .cat-item img { width: 40px; height: 40px; border-radius: 50%; background: #eee; margin-bottom: 4px; border: 2px solid transparent; object-fit: cover; }
        .cat-item.active { color: var(--burgundy); }
        .cat-item.active img { border-color: var(--burgundy); }
        .menu-grid { flex-grow: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-content: start; padding-bottom: 150px; }
        .product-card { background: white; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 3px 8px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; gap: 4px; }
        .product-card img { width: 100%; height: 80px; object-fit: contain; }
        .product-card h3 { font-size: 9px; margin: 0; font-weight: 700; color: var(--dark); min-height: 22px; }
        .product-card .price { font-size: 11px; font-weight: 900; color: var(--accent); margin: 4px 0; }
        .qty-badge { position: absolute; top: -4px; right: -4px; background: var(--burgundy); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; line-height: 18px; display: none; border: 2px solid white; font-weight: 900; z-index: 10; }
        .counter-controls { display: flex; align-items: center; justify-content: space-between; background: #f8f8f8; border-radius: 20px; padding: 2px; border: 1px solid #eee; }
        .btn-qty { width: 28px; height: 28px; border-radius: 50%; border: none; background: white; color: var(--burgundy); font-weight: 900; font-size: 16px; cursor: pointer; }
        .payment-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1512; padding: 10px 15px 25px 15px; z-index: 100; border-radius: 20px 20px 0 0; }
        .footer-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .btn-view-cart { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 8px 14px; border-radius: 10px; font-size: 10px; font-weight: 700; }
        .total-price { font-size: 20px; color: var(--accent); font-weight: 900; }
        .footer-btns-row { display: flex; gap: 10px; }
        .btn-footer { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 900; text-transform: uppercase; font-size: 12px; cursor: pointer; }
        .btn-clear { background: #333; color: #888; }
        .btn-pay { background: var(--burgundy); color: white; }
        #cart-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 25px; }
        .modal-content { background: white; border-radius: 25px; padding: 20px; width: 100%; max-width: 320px; }
        .cart-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 11px; }
    </style>
</head>
<body>

    <div class="header-container">
        <button class="back-floating-btn" onclick="window.location.href='index.html'"><span>←</span> Назад</button>
        <div class="promo-banner"><img src="shokoladnya oreshki.jpg"></div>
        <div class="logo-area"><img src="Logo.png"></div>
    </div>

    <div class="main-area">
        <div class="sidebar" id="sidebar"></div>
        <div class="menu-grid" id="menu-grid"></div>
    </div>

    <div class="payment-footer">
        <div class="footer-top">
            <button class="btn-view-cart" onclick="showCart()">Просмотреть заказ</button>
            <div class="total-info">
                <span class="total-price"><span id="total-val">0.00</span> BYN</span>
            </div>
        </div>
        <div class="footer-btns-row">
            <button class="btn-footer btn-clear" onclick="clearCart()">Очистить</button>
            <button class="btn-footer btn-pay" onclick="tg.showAlert('Оформление...')">Оформить</button>
        </div>
    </div>

    <div id="cart-modal" onclick="closeCart()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="text-align:center; font-size: 16px; margin-bottom: 15px; color: var(--burgundy);">ВАШ ЗАКАЗ</h2>
            <div id="cart-items-list" style="max-height: 250px; overflow-y: auto;"></div>
            <div id="cart-total-info" style="border-top: 1px solid #eee; padding-top: 10px; text-align: right; font-weight: 900; margin-top: 10px;"></div>
            <button class="btn-footer" style="width: 100%; margin-top: 15px; background: var(--green); color: white;" onclick="closeCart()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let cart = {}; let total = 0;
        const products = [
            { id: 'q1', cat: 0, name: 'Орешки со сгущёнкой', price: 1.10, img: 'oreshki.png', min: 20 },
            { id: 'q2', cat: 0, name: 'Орешки + орех', price: 1.50, img: 'oreshki sguchenka oreh.png', min: 20 },
            { id: 'q3', cat: 0, name: 'Кокос и миндаль', price: 1.80, img: 'oreshki kokos.jpg', min: 20 },
            { id: 'q4', cat: 0, name: 'Nutella и фундук', price: 1.80, img: 'shokoladnya oreshki.jpg', min: 20 },
            { id: 'q5', cat: 1, name: 'Трубочки', price: 4.00, img: 'trubochka1.jpg', min: 6 },
            { id: 'q6', cat: 2, name: 'Муравейник', price: 2.50, img: 'muraveynik.jpg', min: 8 },
            { id: 'q7', cat: 2, name: 'Грибочки', price: 2.50, img: 'grobochki.jpg', min: 12 },
            { id: 'q11', cat: 2, name: 'Картошка', price: 4.00, img: 'kartoshka.jpg', min: 4 },
            { id: 't1', cat: 3, name: 'Медовик 1.1кг', price: 65.00, img: 'tort 2.jpg', min: 1 },
            { id: 't2', cat: 3, name: 'Медовик 2.2кг', price: 130.00, img: 'tort 2.jpg', min: 1 }
        ];

        function init() { renderSidebar(); renderProducts(0); }

        function renderSidebar() {
            const categories = ["ОРЕШКИ", "ТРУБОЧКИ", "ПИРОЖНЫЕ", "ТОРТ", "НАБОРЫ"];
            const imgs = ['oreshki.png', 'trubochka1.jpg', 'muraveynik.jpg', 'tort 2.jpg', 'oreshki.png'];
            document.getElementById('sidebar').innerHTML = categories.map((name, i) => `
                <div class="cat-item ${i==0?'active':''}" onclick="changeCat(${i}, this)">
                    <img src="${imgs[i]}"><br>${name}
                </div>
            `).join('');
        }

        function renderProducts(catIndex) {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = products.filter(p => p.cat === catIndex).map(p => {
                const count = cart[p.id] || 0;
                return `
                    <div class="product-card">
                        <div class="qty-badge" id="badge-${p.id}" style="display:${count>0?'block':'none'}">${count}</div>
                        <img src="${p.img}">
                        <h3>${p.name}</h3>
                        <div class="price">${p.price.toFixed(2)} BYN</div>
                        <div class="counter-controls">
                            <button class="btn-qty" onclick="changeQty('${p.id}', -1)">−</button>
                            <span id="qty-${p.id}">${count}</span>
                            <button class="btn-qty" onclick="changeQty('${p.id}', 1)">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function changeCat(i, el) {
            document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderProducts(i);
        }

        function changeQty(id, delta) {
            const p = products.find(x => x.id === id);
            let cur = cart[id] || 0;
            if (cur === 0 && delta === 1) delta = p.min;
            let next = cur + delta;
            if (next < 0) return;
            if (next < p.min && next > 0 && delta < 0) next = 0;
            cart[id] = next;
            if (cart[id] <= 0) delete cart[id];
            
            updateGlobalTotal();
            updateUI(id);
            if(document.getElementById('cart-modal').style.display === 'flex') showCart();
        }

        function updateGlobalTotal() {
            total = 0;
            for (let id in cart) {
                let p = products.find(x => x.id === id);
                total += (p.price * cart[id]);
            }
            document.getElementById('total-val').innerText = total.toFixed(2);
        }

        function updateUI(id) {
            if (document.getElementById(`qty-${id}`)) document.getElementById(`qty-${id}`).innerText = cart[id] || 0;
            let b = document.getElementById(`badge-${id}`);
            if (b) { b.innerText = cart[id] || 0; b.style.display = cart[id]>0?'block':'none'; }
        }

        function showCart() {
            const list = document.getElementById('cart-items-list');
            const totalBox = document.getElementById('cart-total-info');
            const entries = Object.entries(cart);
            if (!entries.length) {
                list.innerHTML = `<div style="text-align:center; color:#999;">Пусто</div>`;
                totalBox.innerHTML = "";
            } else {
                list.innerHTML = entries.map(([id, q]) => {
                    const p = products.find(x => x.id === id);
                    return `
                        <div class="cart-row">
                            <span style="flex:1">${p.name}</span>
                            <div class="counter-controls" style="margin: 0 10px;">
                                <button class="btn-qty" style="width:22px; height:22px" onclick="changeQty('${id}', -1)">-</button>
                                <span style="margin:0 8px">${q}</span>
                                <button class="btn-qty" style="width:22px; height:22px" onclick="changeQty('${id}', 1)">+</button>
                            </div>
                            <span>${(p.price * q).toFixed(2)}</span>
                        </div>`;
                }).join('');
                totalBox.innerHTML = `ИТОГО: ${total.toFixed(2)} BYN`;
            }
            document.getElementById('cart-modal').style.display = 'flex';
        }

        function clearCart() { cart = {}; total = 0; updateGlobalTotal(); renderProducts(0); }
        function closeCart() { document.getElementById('cart-modal').style.display = 'none'; }
        init();
    </script>
</body>
</html>
