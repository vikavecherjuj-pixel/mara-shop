<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - Оформление</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #c5a059; --burgundy: #630d16; --dark: #2c1a11; --bg: #fdfaf5; --green: #21a252; --gray: #f4f4f4; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 12px; color: var(--dark); min-height: 100vh; }
        #checkout-screen { display: flex; flex-direction: column; gap: 16px; padding-bottom: 50px; }
        .checkout-card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .section-title { font-weight: 900; font-size: 13px; margin-bottom: 16px; color: var(--burgundy); text-transform: uppercase; border-bottom: 1px solid #f8f8f8; padding-bottom: 10px; }

        /* Segmented Control */
        .delivery-selector { display: flex; background: var(--gray); padding: 4px; border-radius: 14px; margin-bottom: 15px; }
        .delivery-option { flex: 1; padding: 12px; text-align: center; font-size: 12px; font-weight: 700; border-radius: 11px; cursor: pointer; color: #888; }
        .delivery-option.active { background: white; color: var(--burgundy); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* Поля ввода */
        input, select, textarea { 
            width: 100%; padding: 14px; border: 1px solid transparent; border-radius: 14px; 
            font-family: 'Montserrat'; font-size: 14px; box-sizing: border-box; 
            background: var(--gray); outline: none; color: black !important;
            caret-color: black; /* Стандартный мигающий слеш */
        }
        input:focus { border-color: var(--accent); background: #fff; }

        /* Разделение Даты и Времени */
        .datetime-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .field-group label { display: block; font-size: 10px; font-weight: 800; color: #bbb; text-transform: uppercase; margin-bottom: 6px; }
        
        #order-time:disabled { opacity: 0.5; cursor: not-allowed; }

        .or-divider { text-align: center; font-size: 10px; font-weight: 700; color: #ccc; margin: 10px 0; text-transform: uppercase; }

        /* Товары */
        .preview-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 6px; }
        .item-name { flex: 1; padding-right: 10px; }
        .item-cost { font-weight: 700; color: var(--accent); }
        .final-total { text-align: right; font-weight: 900; color: var(--accent); font-size: 20px; margin-top: 10px; }

        .discuss-btn { width: 100%; padding: 14px; background: transparent; color: var(--burgundy); border: 2px dashed #ddd; border-radius: 14px; font-weight: 700; font-size: 12px; cursor: pointer; }
        .discuss-btn.active { background: var(--burgundy); color: white; border-style: solid; }

        .erip-box { background: #f9fdf9; border: 1px solid #eef7ee; padding: 18px; border-radius: 18px; font-size: 11px; line-height: 1.4; }
        .btn-main { width: 100%; padding: 20px; background: var(--green); color: white; border: none; border-radius: 18px; font-weight: 900; font-size: 15px; text-transform: uppercase; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="checkout-screen">
        <div class="checkout-card">
            <div class="section-title">Ваш выбор</div>
            <div id="cart-list"></div>
            <div class="final-total" id="final-sum">0.00 BYN</div>
        </div>

        <div class="checkout-card">
            <div class="section-title">Способ получения</div>
            <div class="delivery-selector">
                <div class="delivery-option active" onclick="setDeliv('Самовывоз', this)">Самовывоз</div>
                <div class="delivery-option" onclick="setDeliv('Яндекс.Доставка', this)">Доставка</div>
            </div>

            <div class="datetime-grid">
                <div class="field-group">
                    <label>Дата</label>
                    <input type="date" id="order-date" onchange="enableTime()">
                </div>
                <div class="field-group">
                    <label>Время</label>
                    <select id="order-time" disabled>
                        <option value="">Сначала дату</option>
                    </select>
                </div>
            </div>

            <div class="or-divider">или</div>
            <button id="btn-discuss" class="discuss-btn" onclick="toggleDisc()">Обсудить время в переписке</button>
        </div>

        <div class="checkout-card">
            <div class="section-title">Ваши данные</div>
            <label style="font-size:10px; color:#bbb; font-weight:800;">ИМЯ</label>
            <input type="text" id="c-name" placeholder="Введите ваше имя" style="margin-bottom:12px;">
            <label style="font-size:10px; color:#bbb; font-weight:800;">ТЕЛЕФОН</label>
            <input type="tel" id="c-phone" value="+375 ">
        </div>

        <div class="checkout-card">
            <div class="section-title">Оплата (ЕРИП)</div>
            <div class="erip-box">
                Система Расчета ЕРИП / Банковские, Финансовые услуги / Банки, НКФО / АЛЬФА-БАНК / Пополнение счета <br>
                <strong style="color:var(--green); font-size:16px;">+375 (29) 651-44-03</strong>
            </div>
            <button class="btn-main" onclick="finish()">Заказать</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let method = "Самовывоз";
        let isDisc = false;

        const products = {
            'q1': { n: 'Орешки со сгущёнкой', p: 1.10 }, 'q4': { n: 'Nutella и фундук', p: 1.80 }
            // Добавьте остальные id и цены аналогично
        };

        function render() {
            const cart = JSON.parse(localStorage.getItem('mara_cart') || '{}');
            const total = localStorage.getItem('mara_total') || '0.00';
            let h = '';
            for (let id in cart) {
                const item = products[id] || { n: id, p: 0 };
                const linePrice = (item.p * cart[id]).toFixed(2);
                h += `<div class="preview-row">
                        <span class="item-name">${item.n} × ${cart[id]}</span>
                        <span class="item-cost">${linePrice} BYN</span>
                      </div>`;
            }
            document.getElementById('cart-list').innerHTML = h;
            document.getElementById('final-sum').innerText = total + " BYN";
        }

        function enableTime() {
            const t = document.getElementById('order-time');
            t.disabled = false;
            t.innerHTML = '<option value="">Выбрать время</option>';
            for(let h=9; h<=21; h++) {
                let o = document.createElement('option');
                o.value = h+':00'; o.innerText = h+':00';
                t.appendChild(o);
            }
            isDisc = false;
            document.getElementById('btn-discuss').classList.remove('active');
        }

        function setDeliv(m, el) {
            method = m;
            document.querySelectorAll('.delivery-option').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
        }

        function toggleDisc() {
            isDisc = !isDisc;
            document.getElementById('btn-discuss').classList.toggle('active', isDisc);
            if(isDisc) {
                document.getElementById('order-date').value = '';
                document.getElementById('order-time').disabled = true;
            }
        }

        function finish() {
            const name = document.getElementById('c-name').value;
            if(!name) return tg.showAlert("Введите имя!");
            tg.sendData(JSON.stringify({ name, method, disc: isDisc }));
            tg.close();
        }

        window.onload = render;
    </script>
</body>
</html>
