<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - Оформление (Гомель)</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #c5a059; --burgundy: #630d16; --dark: #2c1a11; --bg: #fdfaf5; --green: #21a252; --gray: #f4f4f4; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 12px; color: var(--dark); min-height: 100vh; }
        #checkout-screen { display: flex; flex-direction: column; gap: 16px; padding-bottom: 50px; }
        .back-link-container { margin-bottom: 5px; }
        .back-link-container a { color: #aaa; text-decoration: none; font-size: 13px; font-weight: 700; display: inline-block; padding: 5px 0; }
        .checkout-card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .section-title { font-weight: 900; font-size: 13px; margin-bottom: 16px; color: var(--burgundy); text-transform: uppercase; border-bottom: 1px solid #f8f8f8; padding-bottom: 10px; }
        .delivery-selector { display: flex; background: var(--gray); padding: 4px; border-radius: 14px; margin-bottom: 12px; }
        .delivery-option { flex: 1; padding: 12px; text-align: center; font-size: 12px; font-weight: 700; border-radius: 11px; cursor: pointer; color: #888; transition: all 0.2s; }
        .delivery-option.active { background: white; color: var(--burgundy); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #delivery-note { font-size: 11px; color: #888; line-height: 1.5; margin-bottom: 15px; background: #fffcf5; padding: 12px; border-radius: 12px; border-left: 3px solid var(--accent); }
        input, select, textarea { width: 100%; border: 1px solid transparent; border-radius: 14px; font-family: 'Montserrat'; font-size: 14px; box-sizing: border-box; background: var(--gray); outline: none; color: black !important; caret-color: black; padding: 14px; }
        .field-group label { display: block; font-size: 10px; font-weight: 800; color: #bbb; text-transform: uppercase; margin-bottom: 6px; }
        .preview-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 6px; }
        .item-cost { font-weight: 700; color: var(--accent); }
        .final-total { text-align: right; font-weight: 900; color: var(--accent); font-size: 20px; }
        .btn-main { width: 100%; padding: 20px; background: var(--green); color: white; border: none; border-radius: 18px; font-weight: 900; font-size: 15px; text-transform: uppercase; cursor: pointer; }
        .discuss-btn { width: 100%; padding: 14px; background: transparent; color: var(--burgundy); border: 2px dashed #ddd; border-radius: 14px; font-weight: 700; font-size: 12px; }
        .discuss-btn.active { background: var(--burgundy); color: white; border-style: solid; }
        
        /* ПЛАШКА СПАСИБО */
        #thanks-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); z-index: 1000; align-items: center; justify-content: center; text-align: center;
        }
    </style>
</head>
<body>
    <div id="thanks-overlay">
        <div style="padding: 30px;">
            <h2 style="color: var(--burgundy); font-weight: 900; font-size: 24px;">СПАСИБО ЗА ЗАКАЗ! ❤️</h2>
            <p id="thanks-text" style="font-weight: 600; color: #666;">Перенаправляем вас в чат...</p>
        </div>
    </div>

    <div id="checkout-screen">
        <div class="back-link-container"><a href="../shop.html" id="ui-back">← Назад в каталог</a></div>

        <div class="checkout-card">
            <div class="section-title" id="ui-choice">Ваш выбор</div>
            <div id="cart-list"></div>
            <div class="final-total" id="final-sum">0.00 BYN</div>
        </div>

        <div class="checkout-card">
            <div class="section-title" id="ui-method">Способ получения</div>
            <div class="delivery-selector">
                <div class="delivery-option active" id="opt-pickup" onclick="setDeliv('Самовывоз')">Самовывоз</div>
                <div class="delivery-option" id="opt-delivery" onclick="setDeliv('Доставка')">Доставка</div>
            </div>
            <div id="delivery-note"></div>
            <div id="time-selection-area">
                <div style="display:flex; gap:10px;">
                    <div class="field-group" style="flex:1;">
                        <label id="ui-date">Дата</label>
                        <input type="date" id="order-date" onchange="enableTime()">
                    </div>
                    <div class="field-group" style="flex:1;">
                        <label id="ui-time">Время</label>
                        <select id="order-time" disabled><option value="">...</option></select>
                    </div>
                </div>
            </div>
            <div style="text-align:center; margin:10px 0; font-size:10px; color:#ccc;">ИЛИ</div>
            <button id="btn-discuss" class="discuss-btn" onclick="toggleDisc()">Согласовать время после оплаты</button>
            <span id="discuss-hint" style="display:none; font-size:11px; text-align:center; margin-top:10px; color:#666;">Напишем вам в чат для уточнения.</span>
        </div>

        <div class="checkout-card">
            <div class="section-title" id="ui-data">Ваши данные</div>
            <label class="field-group"><label id="ui-name">Имя</label><input type="text" id="c-name"></label>
            <label class="field-group" style="margin-top:10px;"><label id="ui-phone">Телефон</label><input type="tel" id="c-phone" value="+375 "></label>
            <label class="field-group" style="margin-top:10px;"><label id="ui-comment">Комментарий</label><textarea id="c-comment" rows="3"></textarea></label>
        </div>

        <div class="checkout-card">
            <div class="section-title">Оплата (ЕРИП)</div>
            <div style="background:#f9fdf9; padding:15px; border-radius:15px; font-size:11px;">
                ЕРИП / Альфа-Банк / Пополнение счета: <br>
                <strong style="font-size:18px; color:var(--green);">+375 (29) 651-44-03</strong>
                <button class="btn-main" style="background:var(--gray); color:var(--burgundy); padding:10px; font-size:10px; margin-top:10px;" onclick="copyNumber('+375296514403', this)">Скопировать номер</button>
            </div>
            <button class="btn-main" style="margin-top:20px;" onclick="finishOrder()">Оплачено, заказать</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let lang = localStorage.getItem('selectedLang') || 'ru';
        let method = "Самовывоз";
        let isDisc = false;

        const ui = {
            ru: { pickup: "Самовывоз", delivery: "Доставка", alert: "Заполните имя и телефон!", alert_time: "Выберите дату и время!", pcs: "шт.", thanks: "Перенаправляем в чат..." },
            by: { pickup: "Самавываз", delivery: "Дастаўка", alert: "Увядзіце імя і тэлефон!", alert_time: "Абярыце дату і час!", pcs: "шт.", thanks: "Перанакіроўваем у чат..." },
            en: { pickup: "Pickup", delivery: "Delivery", alert: "Enter name and phone!", alert_time: "Select date and time!", pcs: "pcs.", thanks: "Redirecting to chat..." }
        };

        const productsData = {
            'q1': { name: {ru:'Орешки со сгущёнкой', by:'Арэшкі са згушчонкай', en:'Nuts'}, price: 1.10 },
            'q2': { name: {ru:'Орешки + орех', by:'Арэшкі + арэх', en:'Nuts + nut'}, price: 1.50 },
            'q3': { name: {ru:'Кокос и миндаль', by:'Какос і міндаль', en:'Coconut'}, price: 1.80 },
            'q4': { name: {ru:'Nutella и фундук', by:'Nutella і фундук', en:'Nutella'}, price: 1.80 },
            'q5': { name: {ru:'Трубочки', by:'Трубачкі', en:'Rolls'}, price: 4.00 },
            'q6': { name: {ru:'Муравейник', by:'Мурашнік', en:'Ant Hill'}, price: 2.50 },
            'q7': { name: {ru:'Грибочки', by:'Грыбочкі', en:'Mushrooms'}, price: 2.50 },
            'q8': { name: {ru:'Сердечки', by:'Сэрцайкі', en:'Hearts'}, price: 2.50 },
            'q9': { name: {ru:'Кокосовое', by:'Какосавае', en:'Coconut cookies'}, price: 2.50 },
            'q10': { name: {ru:'Орешки в глазури', by:'Арэшкі ў глазуры', en:'Glazed nuts'}, price: 2.50 },
            'q11': { name: {ru:'Картошка', by:'Бульба', en:'Kartoshka'}, price: 4.00 },
            'q12': { name: {ru:'Шоколадная колбаса', by:'Шакаладная каўбаса', en:'Sausage'}, price: 12.00 },
            't1': { name: {ru:'Медовик 1.1кг', by:'Мядовік 1.1кг', en:'Honey cake'}, price: 65.00 },
            't2': { name: {ru:'Медовик 2.2кг', by:'Мядовік 2.2кг', en:'Honey cake'}, price: 130.00 },
            'n1': { name: {ru:'Набор 1', by:'Набор 1', en:'Set 1'}, price: 22.00 },
            'n2': { name: {ru:'Набор 2', by:'Набор 2', en:'Set 2'}, price: 32.00 },
            'n3': { name: {ru:'Набор 3', by:'Набор 3', en:'Set 3'}, price: 34.00 },
            'n4': { name: {ru:'Набор 4', by:'Набор 4', en:'Set 4'}, price: 45.00 },
            'n5': { name: {ru:'Набор 5', by:'Набор 5', en:'Set 5'}, price: 38.00 },
            'n6': { name: {ru:'Набор 6', by:'Набор 6', en:'Set 6'}, price: 54.00 }
        };

        window.onload = function() {
            render();
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('order-date').setAttribute('min', today);
            document.getElementById('order-date').value = today;
            enableTime();
        };

        function render() {
            const cart = JSON.parse(localStorage.getItem('mara_cart') || '{}');
            let html = '';
            for (let id in cart) {
                const item = productsData[id];
                if (item) html += `<div class="preview-row"><span>${item.name[lang]} (${cart[id]} ${ui[lang].pcs})</span><span class="item-cost">${(item.price * cart[id]).toFixed(2)} BYN</span></div>`;
            }
            document.getElementById('cart-list').innerHTML = html;
            document.getElementById('final-sum').innerText = (localStorage.getItem('mara_total') || '0.00') + " BYN";
        }

        function setDeliv(m) {
            method = m;
            document.getElementById('opt-pickup').classList.toggle('active', m === 'Самовывоз');
            document.getElementById('opt-delivery').classList.toggle('active', m === 'Доставка');
            document.getElementById('delivery-note').innerHTML = (m === 'Самовывоз') 
                ? `Свиридова 11, 6 подъезд. Позвоните за 10 мин: <br><strong>+375 (29) 651-44-03</strong>` 
                : `Отправляем через Яндекс.Доставка. Оплата доставки — за счет клиента.`;
        }

        function enableTime() {
            const t = document.getElementById('order-time');
            t.disabled = false;
            t.innerHTML = '';
            for (let h = 9; h <= 21; h++) {
                let opt = document.createElement('option');
                opt.value = h + ':00'; opt.innerText = h + ':00'; t.appendChild(opt);
            }
        }

        function toggleDisc() {
            isDisc = !isDisc;
            document.getElementById('btn-discuss').classList.toggle('active', isDisc);
            document.getElementById('discuss-hint').style.display = isDisc ? 'block' : 'none';
            document.getElementById('time-selection-area').style.opacity = isDisc ? '0.3' : '1';
        }

        function copyNumber(num, btn) {
            navigator.clipboard.writeText(num);
            btn.innerText = "СКОПИРОВАНО";
            setTimeout(() => btn.innerText = "СКОПИРОВАТЬ НОМЕР", 2000);
        }

        function finishOrder() {
            const name = document.getElementById('c-name').value;
            const phone = document.getElementById('c-phone').value;
            if(!name || phone.length < 10) return tg.showAlert(ui[lang].alert);

            const cart = JSON.parse(localStorage.getItem('mara_cart') || '{}');
            let itemsStr = "";
            for (let id in cart) { if(productsData[id]) itemsStr += productsData[id].name[lang] + " ("+cart[id]+" шт); "; }

            const data = {
                city_type: "ГОМЕЛЬ",
                name: name,
                phone: phone,
                method: method,
                items: itemsStr,
                address: method === 'Самовывоз' ? 'Самовывоз (Свиридова 11)' : 'Яндекс Доставка (Адрес в комментарии)',
                date: isDisc ? "Согласовать" : document.getElementById('order-date').value,
                time: isDisc ? "Согласовать" : document.getElementById('order-time').value,
                comment: document.getElementById('c-comment').value,
                total: document.getElementById('final-sum').innerText
            };

            document.getElementById('thanks-overlay').style.display = 'flex';
            setTimeout(() => {
                tg.sendData(JSON.stringify(data));
                tg.close();
            }, 1800);
        }
    </script>
</body>
</html>
