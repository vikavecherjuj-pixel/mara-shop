<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - Оформление Гомель</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #c5a059; --burgundy: #630d16; --dark: #2c1a11; --bg: #fdfaf5; --green: #27ae60; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--dark); min-height: 100vh; }
        #checkout-screen { display: flex; flex-direction: column; gap: 12px; padding-bottom: 40px; }
        .back-link-top { text-align: left; margin-bottom: 5px; }
        .back-link-top a { color: #aaa; text-decoration: none; font-size: 13px; font-weight: 700; }
        .checkout-card { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .checkout-title { font-weight: 900; font-size: 14px; margin-bottom: 12px; color: var(--burgundy); text-transform: uppercase; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
        label { display: block; font-size: 10px; font-weight: 700; margin-bottom: 6px; color: #888; text-transform: uppercase; }
        
        input, select, textarea { 
            width: 100%; padding: 14px; border: 1px solid #f0f0f0; border-radius: 12px; 
            font-family: 'Montserrat'; font-size: 14px; margin-bottom: 12px; box-sizing: border-box; 
            background: #fafafa; outline: none; color: black !important;
        }

        .preview-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; border-bottom: 1px dashed #eee; padding-bottom: 4px; }
        .final-sum { text-align: right; font-weight: 900; color: var(--accent); font-size: 18px; margin-top: 10px; }
        
        .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .time-btn { padding: 10px 5px; border: 1px solid #eee; border-radius: 10px; font-size: 11px; background: #fff; font-weight: 700; font-family: 'Montserrat'; }
        .time-btn.active { background: var(--burgundy); color: white; }
        
        .btn-main { width: 100%; padding: 18px; background: var(--burgundy); color: white; border: none; border-radius: 15px; font-weight: 900; font-size: 14px; text-transform: uppercase; cursor: pointer; font-family: 'Montserrat'; }
        .btn-discuss-active { background: var(--burgundy); color: white; margin-top: 10px; padding: 15px; font-size: 11px; font-weight: 700; border-radius: 12px; border: none; width: 100%; text-transform: uppercase; font-family: 'Montserrat'; }
        
        .erip-box { background: #f9fdf9; border: 1px solid #eef7ee; padding: 20px; border-radius: 15px; }
        .erip-phone { color: var(--green); font-weight: 900; font-size: 20px; display: block; margin: 10px 0; }
        .btn-copy { background: #f0f0f0; border: none; border-radius: 10px; padding: 12px; width: 100%; font-size: 11px; font-weight: 700; text-transform: uppercase; font-family: 'Montserrat'; }
    </style>
</head>
<body onclick="document.activeElement.blur()">
    <div id="checkout-screen">
        <h2 style="text-align: center; font-weight: 900; font-size: 22px; margin: 15px 0;">ОФОРМЛЕНИЕ</h2>
        <div class="back-link-top"><a href="../shop.html">← Назад в каталог</a></div>
        
        <div class="checkout-card">
            <div class="checkout-title">Ваш заказ</div>
            <div id="cart-items-preview"></div>
            <div class="final-sum" id="final-sum">0.00 BYN</div>
        </div>

        <div class="checkout-card">
            <div class="checkout-title">Контактные данные</div>
            <label>Имя</label>
            <input type="text" id="cust-name" placeholder="Введите ваше имя">
            <label>Телефон</label>
            <input type="tel" id="cust-phone" value="+375 ">
        </div>

        <div class="checkout-card">
            <div class="checkout-title">Способ получения</div>
            <select id="delivery-type" onchange="updateDeliveryText()">
                <option value="Самовывоз">Самовывоз (Свиридова 11)</option>
                <option value="Яндекс.Доставка">Яндекс.Доставка</option>
            </select>
            <div id="delivery-info-text" style="font-size: 10px; color: #888; font-weight: 600; line-height: 1.4;">
                <span id="pickup-address-line">*Самовывоз: Свиридова 11, 6 подъезд<br></span>
                Позвоните за 10 минут до приезда: <a href="tel:+375296514403" style="color: var(--burgundy); text-decoration: none; font-weight: 900;">+375 (29) 651-44-03</a>
            </div>
            
            <label style="margin-top:15px;">Дата</label>
            <input type="date" id="order-date" onchange="generateTimeSlots()">
            
            <div id="time-section" style="display:none;"><div class="time-grid" id="time-slots"></div></div>
            <button class="btn-discuss-active" onclick="setDiscuss()">Обсудить время с кондитером</button>
        </div>

        <div class="checkout-card">
            <div class="checkout-title">Оплата (ЕРИП)</div>
            <div class="erip-box">
                <div style="font-size:11px; color:#555;">Система ЕРИП / Банки / АЛЬФА-БАНК / Пополнение счета:</div>
                <div class="erip-phone">+375 (29) 651-44-03</div>
                <button class="btn-copy" onclick="copyPhone()">Скопировать номер</button>
            </div>
            <button class="btn-main" style="margin-top:15px;" onclick="finalSubmit()">Подтвердить и заказать</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let selectedTime = "";

        // База товаров для корректных названий
        const productsData = {
            'q1': 'Орешки со сгущёнкой', 'q2': 'Орешки + орех', 'q3': 'Кокос и миндаль',
            'q4': 'Nutella и фундук', 'q5': 'Трубочки', 'q6': 'Муравейник',
            'q7': 'Грибочки', 'q8': 'Сердечки', 'q9': 'Кокосовое',
            'q10': 'Орешки в глазури', 'q11': 'Картошка', 'q12': 'Шоколадная колбаса',
            't1': 'Медовик 1.1кг', 't2': 'Медовик 2.2кг', 'n1': 'Набор Ассорти'
        };

        function init() {
            // 1. Блокировка прошедших дат
            const dateInput = document.getElementById('order-date');
            const today = new Date().toISOString().split('T')[0];
            dateInput.setAttribute('min', today);
            
            renderOrder();
        }

        // 2. Отображение названий и сумм
        function renderOrder() {
            const cart = JSON.parse(localStorage.getItem('mara_cart') || '{}');
            const total = localStorage.getItem('mara_total') || '0.00';
            let html = '';
            
            for (let id in cart) {
                const name = productsData[id] || id;
                html += `<div class="preview-row"><span>${name} (${cart[id]} шт.)</span></div>`;
            }
            document.getElementById('cart-items-preview').innerHTML = html;
            document.getElementById('final-sum').innerText = total + " BYN";
        }

        // 3. Скрытие строки самовывоза при Яндекс.Доставке
        function updateDeliveryText() {
            const type = document.getElementById('delivery-type').value;
            const addressLine = document.getElementById('pickup-address-line');
            addressLine.style.display = (type === 'Яндекс.Доставка') ? 'none' : 'inline';
        }

        function generateTimeSlots() {
            const container = document.getElementById('time-slots');
            document.getElementById('time-section').style.display = 'block';
            container.innerHTML = '';
            for (let h = 9; h <= 21; h++) {
                let btn = document.createElement('button');
                btn.className = 'time-btn'; btn.innerText = h + ':00';
                btn.onclick = () => { 
                    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active'); selectedTime = h + ':00'; 
                };
                container.appendChild(btn);
            }
        }

        function setDiscuss() { selectedTime = "Обсудить с кондитером"; tg.showAlert("Выбрано: Обсудить время"); }
        function copyPhone() { navigator.clipboard.writeText('+375296514403'); tg.showAlert("Номер скопирован!"); }

        function finalSubmit() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            if(!name || phone.length < 10) return tg.showAlert("Заполните данные!");
            
            const data = {
                name, phone, 
                delivery: document.getElementById('delivery-type').value,
                date: document.getElementById('order-date').value,
                time: selectedTime,
                total: document.getElementById('final-sum').innerText
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }

        window.onload = init;
    </script>
</body>
</html>
