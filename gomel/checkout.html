<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - Оформление (Гомель)</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #c5a059; --burgundy: #630d16; --dark: #2c1a11; --bg: #fdfaf5; --green: #21a252; --gray: #f4f4f4; }
        
        html, body { 
            font-family: 'Montserrat', sans-serif; 
            background: linear-gradient(180deg,#fffdf9 0%,#f8f1e8 100%); 
            margin: 0; 
            padding: 12px; 
            color: var(--dark); 
            min-height: 100vh; 
            overflow-x: hidden; 
            touch-action: pan-y;
            position: relative;
            width: 100%;
            -webkit-text-size-adjust: 100%;
            box-sizing: border-box;
        }

        #checkout-screen { display: flex; flex-direction: column; gap: 16px; padding-bottom: 120px; }
        .back-link-container { margin-bottom: 5px; }
        .back-link-container a { color: #aaa; text-decoration: none; font-size: 13px; font-weight: 700; display: inline-block; padding: 5px 0; }
        
        .checkout-card { 
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 28px;
            padding: 22px;
            box-shadow: 0 8px 25px rgba(99,13,22,0.06), 0 2px 8px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.7);
        }

        .section-title {
            font-weight:900; font-size:12px; letter-spacing:1px; margin-bottom:16px;
            color:var(--burgundy); text-transform:uppercase; padding-bottom:10px;
            border-bottom:1px solid rgba(197,160,89,0.18);
        }

        .delivery-selector { display: flex; background: var(--gray); padding: 4px; border-radius: 14px; margin-bottom: 12px; }
        .delivery-option { flex: 1; padding: 12px; text-align: center; font-size: 12px; font-weight: 700; border-radius: 11px; cursor: pointer; color: #888; transition: all 0.2s; }
        .delivery-option.active { background: white; color: var(--burgundy); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        #delivery-note { font-size: 11px; color: #888; line-height: 1.5; margin-bottom: 15px; background: #fffcf5; padding: 12px; border-radius: 12px; border-left: 3px solid var(--accent); }
        
        input, select, textarea { 
            width: 100%; border: 1px solid transparent; border-radius: 14px; font-family: 'Montserrat'; font-size: 16px; 
            box-sizing: border-box; background: var(--gray); outline: none; color: black !important; padding: 0 16px; height: 54px;
        }

        .field-group label { display: block; font-size: 10px; font-weight: 800; color: #bbb; text-transform: uppercase; margin-bottom: 6px; }
        
        .preview-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 6px; }
        .final-total { text-align:right; font-weight:900; color:var(--burgundy); font-size:26px; margin-top:14px; }

        .erip-box { background: #f9fdf9; border: 1px solid #eef7ee; padding: 18px; border-radius: 18px; font-size: 11px; line-height: 1.5; }
        .erip-phone { color: var(--green); font-weight: 900; font-size: 18px; display: block; margin-top: 8px; }

        /* ИСПРАВЛЕННЫЙ БЛОК .BTN-MAIN */
        .btn-main {
            position:fixed;
            left:12px;
            right:12px;
            bottom:calc(12px + env(safe-area-inset-bottom));
            width:auto;
            display:block;

            padding:18px;
            background:linear-gradient(135deg,#21a252,#17833f);
            color:white;
            border:none;
            border-radius:18px;
            font-weight:900;
            font-size:15px;
            text-transform:uppercase;
            cursor:pointer;
            box-shadow:0 10px 25px rgba(33,162,82,0.25);
            transition:.2s;
            z-index:999;
        }

        .btn-main:active { transform: scale(0.98); }
        
        .time-btn { padding: 12px; background: #f4f4f4; border-radius: 14px; text-align: center; font-weight: 700; cursor: pointer; }
        .time-btn.active { background: #630d16; color: white; }
        
        .upsell-item{
            display:flex; justify-content:space-between; align-items:center; padding:14px;
            background:#f8f8f8; border-radius:16px; margin-bottom:10px; font-size:14px; font-weight:700; cursor:pointer;
        }
        .upsell-item.active{ background:#fff8ec; border:1px solid #c5a059; }

        .fade-in { animation: fadeIn .35s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="checkout-screen">
        <div class="back-link-container">
            <a href="../shop.html" id="ui-back">← Назад в каталог</a>
        </div>

        <div class="checkout-card">
            <div class="section-title" id="ui-choice">Ваш выбор</div>
            <div id="cart-list"></div>
            <div class="final-total" id="final-sum">0.00 BYN</div>
        </div>

        <div class="checkout-card">
            <div class="section-title" id="ui-method">Способ получения</div>
            <div class="delivery-selector">
                <div class="delivery-option active" id="opt-pickup" onclick="setDeliv('Самовывоз')">Самовывоз</div>
                <div class="delivery-option" id="opt-delivery" onclick="setDeliv('Доставка')">Доставка</div>
            </div>
            <div id="delivery-note"></div>
            <div id="time-selection-area">
                <div class="field-group">
                    <label id="ui-date">Дата</label>
                    <input type="date" id="order-date" onchange="enableTime()">
                </div>
                <div class="field-group" style="margin-top:15px;">
                    <label id="ui-time">Время</label>
                    <div id="order-time-list" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;"></div>
                    <input type="hidden" id="order-time">
                </div>
            </div>
        </div>

        <div class="checkout-card">
            <div class="section-title" id="ui-data">Ваши данные</div>
            <input type="text" id="c-name" placeholder="Ваше имя" style="margin-bottom: 10px;">
            <input type="tel" id="c-phone" value="+375 ">
            <textarea id="c-comment" placeholder="Комментарий к заказу" style="margin-top:10px; height: 80px; padding-top: 15px;"></textarea>
        </div>

        <div class="checkout-card">
            <div class="section-title">Добавить к заказу</div>
            <div class="upsell-item" onclick="toggleUpsell(this,'2 пирожных Картошка',8)">
                <span>✨ 2 пирожных Картошка</span><b>+8 BYN</b>
            </div>
            <div class="upsell-item" onclick="toggleUpsell(this,'Набор орешков мини (6 шт)',12)">
                <span>✨ Набор орешков мини (6 шт)</span><b>+12 BYN</b>
            </div>
        </div>

        <div class="checkout-card">
            <div class="section-title" id="ui-pay-title">Оплата (ЕРИП)</div>
            <div class="erip-box">
                Система Расчета ЕРИП / Пополнение счета
                <span class="erip-phone">+375 (29) 651-44-03</span>
            </div>
        </div>
    </div>

    <button class="btn-main" id="ui-finish" onclick="finishOrder()">Оплачено, заказать</button>

    <script>
        let tg = window.Telegram.WebApp;
        let lang = localStorage.getItem('selectedLang') || 'ru';
        let method = "Самовывоз";
        let upsells = [];

        window.onload = function() {
            render();
            setDeliv('Самовывоз');
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('order-date').setAttribute('min', today);
            document.getElementById('order-date').value = today;
            enableTime();
        };

        function render() {
            const cart = JSON.parse(localStorage.getItem('mara_cart') || '{}');
            const total = localStorage.getItem('mara_total') || '0.00';
            let html = '';
            // Упрощенный рендер для примера
            for (let id in cart) {
                html += `<div class="preview-row"><span>Товар ID: ${id}</span> <span>${cart[id]} шт.</span></div>`;
            }
            document.getElementById('cart-list').innerHTML = html || 'Корзина пуста';
            document.getElementById('final-sum').innerText = total + " BYN";
        }

        function setDeliv(m) {
            method = m;
            document.getElementById('opt-pickup').classList.toggle('active', m === 'Самовывоз');
            document.getElementById('opt-delivery').classList.toggle('active', m === 'Доставка');
            document.getElementById('delivery-note').innerText = m === 'Самовывоз' ? 'Свиридова 11. Позвоните за 10 мин.' : 'Доставка через Яндекс. Оплата за ваш счет.';
        }

        function enableTime() {
            const box = document.getElementById('order-time-list');
            box.innerHTML = '';
            for (let h = 10; h <= 20; h++) {
                let btn = document.createElement('div');
                btn.className = 'time-btn';
                btn.innerText = h + ':00';
                btn.onclick = () => {
                    document.querySelectorAll('.time-btn').forEach(x => x.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('order-time').value = btn.innerText;
                };
                box.appendChild(btn);
            }
        }

        function toggleUpsell(el, name, price) {
            el.classList.toggle('active');
            const idx = upsells.findIndex(x => x.name === name);
            if(idx > -1) upsells.splice(idx, 1); else upsells.push({name, price});
            recalc();
        }

        function recalc() {
            let base = parseFloat(localStorage.getItem('mara_total') || '0');
            let extra = upsells.reduce((s, x) => s + x.price, 0);
            document.getElementById('final-sum').innerText = (base + extra).toFixed(2) + ' BYN';
        }

        function finishOrder() {
            const name = document.getElementById('c-name').value;
            if(!name) return tg.showAlert("Введите имя");
            tg.sendData(JSON.stringify({name: name, status: "paid"}));
            tg.close();
        }
    </script>
</body>
</html>
