<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - Оформление (Гомель)</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #c5a059; --burgundy: #630d16; --dark: #2c1a11; --bg: #fdfaf5; --green: #21a252; --gray: #f4f4f4; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 12px; color: var(--dark); min-height: 100vh; }
        #checkout-screen { display: flex; flex-direction: column; gap: 16px; padding-bottom: 50px; }
        .back-link-container { margin-bottom: 5px; }
        .back-link-container a { color: #aaa; text-decoration: none; font-size: 13px; font-weight: 700; display: inline-block; padding: 5px 0; }
        .checkout-card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .section-title { font-weight: 900; font-size: 13px; margin-bottom: 16px; color: var(--burgundy); text-transform: uppercase; border-bottom: 1px solid #f8f8f8; padding-bottom: 10px; }
        .delivery-selector { display: flex; background: var(--gray); padding: 4px; border-radius: 14px; margin-bottom: 12px; }
        .delivery-option { flex: 1; padding: 12px; text-align: center; font-size: 12px; font-weight: 700; border-radius: 11px; cursor: pointer; color: #888; transition: all 0.2s; }
        .delivery-option.active { background: white; color: var(--burgundy); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #delivery-note { font-size: 11px; color: #888; line-height: 1.5; margin-bottom: 15px; background: #fffcf5; padding: 12px; border-radius: 12px; border-left: 3px solid var(--accent); }
        input, select, textarea { width: 100%; border: 1px solid transparent; border-radius: 14px; font-family: 'Montserrat'; font-size: 14px; box-sizing: border-box; background: var(--gray); outline: none; color: black !important; }
        .datetime-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 5px; }
        .field-group { flex: 1; display: flex; flex-direction: column; }
        .field-group label { display: block; font-size: 10px; font-weight: 800; color: #bbb; text-transform: uppercase; margin-bottom: 6px; }
        .preview-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 6px; }
        .final-total { text-align: right; font-weight: 900; color: var(--accent); font-size: 20px; margin-top: 10px; }
        .erip-box { background: #f9fdf9; border: 1px solid #eef7ee; padding: 18px; border-radius: 18px; font-size: 11px; line-height: 1.5; }
        .btn-main { width: 100%; padding: 20px; background: var(--green); color: white; border: none; border-radius: 18px; font-weight: 900; font-size: 15px; text-transform: uppercase; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="checkout-screen">
        <div class="back-link-container"><a href="../shop.html">← Назад в каталог</a></div>
        <div class="checkout-card">
            <div class="section-title">Ваш выбор</div>
            <div id="cart-list"></div>
            <div class="final-total" id="final-sum">0.00 BYN</div>
        </div>
        <div class="checkout-card">
            <div class="section-title">Способ получения</div>
            <div class="delivery-selector">
                <div class="delivery-option active" id="opt-pickup" onclick="setDeliv('Самовывоз')">Самовывоз</div>
                <div class="delivery-option" id="opt-delivery" onclick="setDeliv('Доставка')">Доставка</div>
            </div>
            <div id="delivery-note"></div>
            <div class="datetime-row">
                <div class="field-group"><label>Дата</label><input type="date" id="order-date"></div>
                <div class="field-group"><label>Время</label><select id="order-time"><option value="12:00">12:00</option><option value="15:00">15:00</option></select></div>
            </div>
        </div>
        <div class="checkout-card">
            <div class="section-title">Ваши данные</div>
            <input type="text" id="c-name" placeholder="Ваше имя" style="margin-bottom:10px; padding:15px;">
            <input type="tel" id="c-phone" value="+375 " style="padding:15px;">
            <textarea id="c-comment" placeholder="Комментарий или адрес" rows="3" style="margin-top:10px; padding:15px;"></textarea>
        </div>
        <div class="checkout-card">
            <div class="section-title">Оплата (ЕРИП)</div>
            <div class="erip-box">Пополнение счета: <br><strong>+375 (29) 651-44-03</strong></div>
            <button class="btn-main" onclick="finishOrder()">Оплачено, заказать</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let method = "Самовывоз";

        function setDeliv(m) {
            method = m;
            document.getElementById('opt-pickup').classList.toggle('active', m === 'Самовывоз');
            document.getElementById('opt-delivery').classList.toggle('active', m === 'Доставка');
        }

        function render() {
            const cart = JSON.parse(localStorage.getItem('mara_cart') || '{}');
            const total = localStorage.getItem('mara_total') || '0.00';
            document.getElementById('final-sum').innerText = total + " BYN";
            // Тут можно добавить отрисовку списка товаров из localStorage
        }
        window.onload = render;

        function finishOrder() {
            const name = document.getElementById('c-name').value;
            const phone = document.getElementById('c-phone').value;
            if(!name || phone.length < 10) return alert("Заполните данные!");

            const data = {
                city_type: "ГОМЕЛЬ",
                name: name,
                phone: phone,
                method: method,
                date: document.getElementById('order-date').value,
                time: document.getElementById('order-time').value,
                address: document.getElementById('c-comment').value,
                total: document.getElementById('final-sum').innerText
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
