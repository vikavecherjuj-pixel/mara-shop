<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - Оформление Гомель</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #c5a059; --burgundy: #630d16; --dark: #2c1a11; --bg: #fdfaf5; --green: #21a252; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--dark); min-height: 100vh; }
        #checkout-screen { display: flex; flex-direction: column; gap: 12px; padding-bottom: 40px; }
        .back-link-top { text-align: left; margin-bottom: 5px; }
        .back-link-top a { color: #aaa; text-decoration: none; font-size: 13px; font-weight: 700; }
        .checkout-card { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .checkout-title { font-weight: 900; font-size: 14px; margin-bottom: 12px; color: var(--burgundy); text-transform: uppercase; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
        label { display: block; font-size: 10px; font-weight: 700; margin-bottom: 6px; color: #888; text-transform: uppercase; }
        
        input, select, textarea { 
            width: 100%; padding: 14px; border: 1px solid #f0f0f0; border-radius: 12px; 
            font-family: 'Montserrat'; font-size: 14px; margin-bottom: 12px; box-sizing: border-box; 
            background: #fafafa; outline: none; color: black !important; caret-color: black !important;
        }

        .preview-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; border-bottom: 1px dashed #eee; padding-bottom: 4px; align-items: center; }
        .item-price-detail { font-weight: 700; color: var(--accent); white-space: nowrap; margin-left: 10px; }
        .final-sum { text-align: right; font-weight: 900; color: var(--accent); font-size: 18px; margin-top: 10px; }
        
        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .time-btn { padding: 10px 5px; border: 1px solid #eee; border-radius: 10px; font-size: 11px; background: #fff; font-weight: 700; font-family: 'Montserrat'; cursor: pointer; min-height: 45px; }
        .time-btn:disabled { opacity: 0.3; background: #eee; cursor: not-allowed; color: #aaa; }
        .time-btn.active { background: var(--burgundy); color: white; border-color: var(--burgundy); }
        .time-btn.discuss-btn { grid-column: span 3; background: #f0f0f0; color: var(--burgundy); border: 1px dashed var(--burgundy); }
        .time-btn.discuss-btn.active { background: var(--burgundy); color: white; border-style: solid; }
        
        .btn-main { width: 100%; padding: 18px; background: var(--green); color: white; border: none; border-radius: 15px; font-weight: 900; font-size: 14px; text-transform: uppercase; cursor: pointer; font-family: 'Montserrat'; box-shadow: 0 4px 10px rgba(33, 162, 82, 0.3); }
        
        .erip-box { background: #f9fdf9; border: 1px solid #eef7ee; padding: 20px; border-radius: 15px; text-align: left; }
        .erip-phone { color: var(--green); font-weight: 900; font-size: 20px; display: block; margin: 10px 0; letter-spacing: 0.5px; }
        .btn-copy { background: #f0f0f0; border: none; border-radius: 10px; padding: 12px; width: 100%; font-size: 11px; font-weight: 700; text-transform: uppercase; font-family: 'Montserrat'; cursor: pointer; }
    </style>
</head>
<body onclick="document.activeElement.blur()">
    <div id="checkout-screen" onclick="event.stopPropagation()">
        <h2 style="text-align: center; font-weight: 900; font-size: 22px; margin: 15px 0;">ОФОРМЛЕНИЕ</h2>
        <div class="back-link-top"><a href="../shop.html">← Назад в каталог</a></div>
        
        <div class="checkout-card">
            <div class="checkout-title">Ваш заказ</div>
            <div id="cart-items-preview"></div>
            <div class="final-sum" id="final-sum">0.00 BYN</div>
        </div>

        <div class="checkout-card">
            <div class="checkout-title">Способ и время получения</div>
            <select id="delivery-type" onchange="updateDeliveryText()">
                <option value="Самовывоз">Самовывоз (Свиридова 11)</option>
                <option value="Яндекс.Доставка">Яндекс.Доставка</option>
            </select>
            <div id="delivery-info-text" style="font-size: 10px; color: #888; font-weight: 600; line-height: 1.4; margin-bottom:15px;">
                <span id="pickup-address-line">*Самовывоз: Свиридова 11, 6 подъезд<br></span>
                Тел: <a href="tel:+375296514403" style="color: var(--burgundy); text-decoration: none; font-weight: 900;">+375 (29) 651-44-03</a>
            </div>
            
            <label>Дата заказа</label>
            <input type="date" id="order-date" onchange="generateTimeSlots()">
            
            <div id="time-section" style="display:none;">
                <label>Выберите время</label>
                <div class="time-grid" id="time-slots"></div>
            </div>
        </div>

        <div class="checkout-card">
            <div class="checkout-title">Контактные данные</div>
            <label>Имя</label>
            <input type="text" id="cust-name" placeholder="Введите ваше имя">
            <label>Телефон</label>
            <input type="tel" id="cust-phone" value="+375 ">
            <label>Комментарий к заказу</label>
            <textarea id="cust-comment" placeholder="Оставьте комментарий (необязательно)" rows="2"></textarea>
        </div>

        <div class="checkout-card">
            <div class="checkout-title">Оплата (ЕРИП)</div>
            <div class="erip-box">
                <div style="font-size:11px; color:#555; line-height: 1.5;">
                    Система Расчета ЕРИП / Банковские услуги / Банки / АЛЬФА-БАНК / Пополнение счета:
                </div>
                <div class="erip-phone">+375 (29) 651-44-03</div>
                <button class="btn-copy" onclick="copyPhone()">Скопировать номер</button>
            </div>
            <button class="btn-main" style="margin-top:20px;" onclick="finalSubmit()">Я оплатил, подтвердить заказ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let selectedTime = "";

        const productsData = {
            'q1': { name: 'Орешки со сгущёнкой', price: 1.10 },
            'q2': { name: 'Орешки + орех', price: 1.50 },
            'q3': { name: 'Кокос и миндаль', price: 1.80 },
            'q4': { name: 'Nutella и фундук', price: 1.80 },
            'q5': { name: 'Трубочки', price: 4.00 },
            'q6': { name: 'Муравейник', price: 2.50 },
            'q7': { name: 'Грибочки', price: 2.50 },
            'q8': { name: 'Сердечки', price: 2.50 },
            'q9': { name: 'Кокосовое', price: 2.50 },
            'q10': { name: 'Орешки в глазури', price: 2.50 },
            'q11': { name: 'Картошка', price: 4.00 },
            'q12': { name: 'Шоколадная колбаса', price: 12.00 },
            't1': { name: 'Медовик 1.1кг', price: 65.00 },
            't2': { name: 'Медовик 2.2кг', price: 130.00 },
            'n1': { name: 'Набор Ассорти', price: 30.00 }
        };

        const dateInput = document.getElementById('order-date');
        const now = new Date();
        const offset = 3 * 60 * 60 * 1000;
        const localNow = new Date(now.getTime() + offset);
        const todayStr = localNow.toISOString().split('T')[0];
        dateInput.setAttribute('min', todayStr);

        function generateTimeSlots() {
            const container = document.getElementById('time-slots');
            const selectedDate = document.getElementById('order-date').value;
            if (selectedDate < todayStr) {
                tg.showAlert("Выбрана прошлая дата!");
                document.getElementById('order-date').value = todayStr;
                return generateTimeSlots();
            }
            document.getElementById('time-section').style.display = 'block';
            container.innerHTML = '';

            // ОПЦИЯ ОБСУДИТЬ ВРЕМЯ (Первая в списке)
            let discBtn = document.createElement('button');
            discBtn.className = 'time-btn discuss-btn';
            discBtn.innerText = 'ОБСУДИТЬ ВРЕМЯ С КОНДИТЕРОМ';
            discBtn.onclick = (e) => {
                e.preventDefault();
                setActiveTime(discBtn, "Обсудить с кондитером");
            };
            container.appendChild(discBtn);

            const currentHour = now.getHours();
            const isToday = (selectedDate === todayStr);

            for (let h = 9; h <= 21; h++) {
                let btn = document.createElement('button');
                btn.className = 'time-btn';
                btn.innerText = h + ':00';
                if (isToday && h < (currentHour + 2)) {
                    btn.disabled = true;
                } else {
                    btn.onclick = (e) => { 
                        e.preventDefault();
                        setActiveTime(btn, h + ':00');
                    };
                }
                container.appendChild(btn);
            }
            selectedTime = ""; 
        }

        function setActiveTime(element, value) {
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active');
            selectedTime = value;
        }

        const phoneInput = document.getElementById('cust-phone');
        phoneInput.addEventListener('input', function(e) {
            let val = e.target.value;
            if (!val.startsWith('+375 ')) { e.target.value = '+375 '; return; }
            let digits = val.substring(5).replace(/\D/g, '');
            let formatted = '+375 ';
            if (digits.length > 0) formatted += '(' + digits.substring(0, 2);
            if (digits.length >= 3) formatted += ') ' + digits.substring(2, 5);
            if (digits.length >= 6) formatted += '-' + digits.substring(5, 7);
            if (digits.length >= 8) formatted += '-' + digits.substring(7, 9);
            e.target.value = formatted;
        });

        function renderOrder() {
            const cart = JSON.parse(localStorage.getItem('mara_cart') || '{}');
            const total = localStorage.getItem('mara_total') || '0.00';
            let html = '';
            for (let id in cart) {
                const item = productsData[id];
                if (item) {
                    const lineSum = (item.price * cart[id]).toFixed(2);
                    html += `<div class="preview-row">
                                <span>${item.name} (${cart[id]} шт.)</span>
                                <span class="item-price-detail">${lineSum} BYN</span>
                             </div>`;
                }
            }
            document.getElementById('cart-items-preview').innerHTML = html;
            document.getElementById('final-sum').innerText = total + " BYN";
        }

        function updateDeliveryText() {
            const type = document.getElementById('delivery-type').value;
            const addressLine = document.getElementById('pickup-address-line');
            addressLine.style.display = (type === 'Яндекс.Доставка') ? 'none' : 'inline';
        }

        function copyPhone() { navigator.clipboard.writeText('+375296514403'); tg.showAlert("Номер скопирован!"); }

        function finalSubmit() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const date = document.getElementById('order-date').value;
            const comment = document.getElementById('cust-comment').value;
            if (date < todayStr) return tg.showAlert("Ошибка! Выбрана прошедшая дата.");
            if(!name || phone.length < 17) return tg.showAlert("Введите имя и полный телефон!");
            if(!date) return tg.showAlert("Выберите дату заказа!");
            if(!selectedTime) return tg.showAlert("Выберите время получения!");
            
            const data = {
                name, phone, 
                delivery: document.getElementById('delivery-type').value,
                date, time: selectedTime,
                comment,
                total: document.getElementById('final-sum').innerText
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }

        window.onload = renderOrder;
    </script>
</body>
</html>
