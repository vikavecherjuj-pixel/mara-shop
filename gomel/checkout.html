<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mara Shop - Оформление (Гомель)</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #c5a059; --burgundy: #630d16; --dark: #2c1a11; --bg: #fdfaf5; --green: #21a252; --gray: #f4f4f4; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; padding: 12px; color: var(--dark); min-height: 100vh; }
        #checkout-screen { display: flex; flex-direction: column; gap: 16px; padding-bottom: 50px; }
        .back-link-container a { color: #aaa; text-decoration: none; font-size: 13px; font-weight: 700; padding: 5px 0; }
        .checkout-card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .section-title { font-weight: 900; font-size: 13px; margin-bottom: 16px; color: var(--burgundy); text-transform: uppercase; border-bottom: 1px solid #f8f8f8; padding-bottom: 10px; }
        .delivery-selector { display: flex; background: var(--gray); padding: 4px; border-radius: 14px; margin-bottom: 12px; }
        .delivery-option { flex: 1; padding: 12px; text-align: center; font-size: 12px; font-weight: 700; border-radius: 11px; cursor: pointer; color: #888; }
        .delivery-option.active { background: white; color: var(--burgundy); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #delivery-note { font-size: 11px; color: #888; margin-bottom: 15px; background: #fffcf5; padding: 12px; border-radius: 12px; border-left: 3px solid var(--accent); }
        input, select, textarea { width: 100%; border: 1px solid transparent; border-radius: 14px; font-family: 'Montserrat'; font-size: 14px; box-sizing: border-box; background: var(--gray); padding: 12px; outline: none; }
        .datetime-row { display: flex; gap: 12px; margin-bottom: 5px; }
        .field-group { flex: 1; }
        .field-group label { font-size: 10px; font-weight: 800; color: #bbb; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .preview-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 6px; }
        .final-total { text-align: right; font-weight: 900; color: var(--accent); font-size: 20px; margin-top: 10px; }
        .discuss-btn { width: 100%; padding: 14px; background: transparent; border: 2px dashed #ddd; border-radius: 14px; font-weight: 700; color: var(--burgundy); }
        .discuss-btn.active { background: var(--burgundy); color: white; border-style: solid; }
        .erip-box { background: #f9fdf9; border: 1px solid #eef7ee; padding: 18px; border-radius: 18px; font-size: 11px; }
        .erip-phone { color: var(--green); font-weight: 900; font-size: 18px; display: block; margin-top: 8px; }
        .copy-btn { width: 100%; padding: 12px; background: var(--gray); border: none; border-radius: 14px; font-weight: 700; margin-top: 12px; }
        .btn-main { width: 100%; padding: 20px; background: var(--green); color: white; border: none; border-radius: 18px; font-weight: 900; font-size: 15px; text-transform: uppercase; margin-top: 15px; }
        #thanks-screen { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 80vh; padding: 20px; }
    </style>
</head>
<body>
    <div id="checkout-screen">
        <div class="back-link-container"><a href="../shop.html">← Назад в каталог</a></div>
        <div class="checkout-card">
            <div class="section-title">Ваш выбор</div>
            <div id="cart-list"></div>
            <div class="final-total" id="final-sum">0.00 BYN</div>
        </div>
        <div class="checkout-card">
            <div class="section-title">Способ получения</div>
            <div class="delivery-selector">
                <div class="delivery-option active" id="opt-pickup" onclick="setDeliv('Самовывоз')">Самовывоз</div>
                <div class="delivery-option" id="opt-delivery" onclick="setDeliv('Доставка')">Доставка</div>
            </div>
            <div id="delivery-note"></div>
            <div id="time-selection-area">
                <div class="datetime-row">
                    <div class="field-group"><label>Дата</label><input type="date" id="order-date" onchange="enableTime()"></div>
                    <div class="field-group"><label>Время</label><select id="order-time" disabled><option>Загрузка...</option></select></div>
                </div>
            </div>
            <button id="btn-discuss" class="discuss-btn" onclick="toggleDisc()" style="margin-top:10px">Согласовать время после оплаты</button>
        </div>
        <div class="checkout-card">
            <div class="section-title">Ваши данные</div>
            <input type="text" id="c-name" placeholder="Ваше имя" style="margin-bottom:10px">
            <input type="tel" id="c-phone" value="+375 ">
            <textarea id="c-comment" placeholder="Комментарий" rows="3" style="margin-top:10px"></textarea>
        </div>
        <div class="checkout-card">
            <div class="section-title">Оплата (ЕРИП)</div>
            <div class="erip-box">
                Система Расчета ЕРИП / Банковские услуги / АЛЬФА-БАНК / Пополнение счета
                <span class="erip-phone">+375 (29) 651-44-03</span>
                <button class="copy-btn" onclick="copyNumber('+375296514403', this)">Скопировать номер</button>
            </div>
            <button class="btn-main" onclick="finishOrder()">Оплачено, заказать</button>
        </div>
    </div>

    <div id="thanks-screen">
        <h2 style="color:var(--burgundy)">СПАСИБО ЗА ЗАКАЗ!</h2>
        <p>Мы получили ваши данные и свяжемся с вами.</p>
        <button class="btn-main" onclick="tg.close()">Закрыть</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let method = "Самовывоз";
        let isDisc = false;

        const productsData = {
            'q1': 'Орешки со сгущёнкой', 'q2': 'Орешки + орех', 'q3': 'Кокос и миндаль',
            'q4': 'Nutella и фундук', 'q5': 'Трубочки', 'q6': 'Муравейник',
            'q7': 'Грибочки', 'q8': 'Сердечки', 'q9': 'Кокосовое',
            'q10': 'Орешки в глазури', 'q11': 'Картошка', 'q12': 'Шоколадная колбаса',
            't1': 'Медовик 1.1кг', 't2': 'Медовик 2.2кг', 'n1': 'Набор Ассорти'
        };

        function render() {
            const cart = JSON.parse(localStorage.getItem('mara_cart') || '{}');
            let html = '';
            for (let id in cart) {
                if (productsData[id]) {
                    html += `<div class="preview-row"><span>${productsData[id]} (${cart[id]} шт.)</span></div>`;
                }
            }
            document.getElementById('cart-list').innerHTML = html;
            document.getElementById('final-sum').innerText = (localStorage.getItem('mara_total') || '0.00') + " BYN";
        }

        function setDeliv(m) {
            method = m;
            document.getElementById('opt-pickup').classList.toggle('active', m === 'Самовывоз');
            document.getElementById('opt-delivery').classList.toggle('active', m === 'Доставка');
            document.getElementById('delivery-note').innerText = m === 'Самовывоз' ? "Свиридова 11. Позвоните за 10 мин." : "Доставка Яндексом за счет клиента.";
        }

        function toggleDisc() {
            isDisc = !isDisc;
            document.getElementById('btn-discuss').classList.toggle('active', isDisc);
            document.getElementById('time-selection-area').style.opacity = isDisc ? '0.3' : '1';
        }

        function enableTime() {
            const t = document.getElementById('order-time');
            t.disabled = false;
            t.innerHTML = '<option value="12:00">12:00</option><option value="15:00">15:00</option><option value="18:00">18:00</option>';
        }

        function copyNumber(num, btn) {
            navigator.clipboard.writeText(num);
            btn.innerText = "Скопировано!";
            setTimeout(() => btn.innerText = "Скопировать номер", 2000);
        }

        function finishOrder() {
            const name = document.getElementById('c-name').value;
            const phone = document.getElementById('c-phone').value;
            if(!name || phone.length < 10) { alert("Введите имя и телефон"); return; }

            const data = {
                city: "ГОМЕЛЬ",
                name, phone, method,
                items: document.getElementById('cart-list').innerText.replace(/\n/g, ', '),
                total: document.getElementById('final-sum').innerText,
                time: isDisc ? "Согласовать" : document.getElementById('order-time').value
            };

            tg.sendData(JSON.stringify(data));
            document.getElementById('checkout-screen').style.display = 'none';
            document.getElementById('thanks-screen').style.display = 'flex';
            localStorage.clear();
        }

        window.onload = render;
    </script>
</body>
</html>
